<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPS / GLONASS / BeiDou Live Sky View</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #e0e0ff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; overflow: hidden; height: 100vh; }
        #canvas-container { position: absolute; inset: 0; }

        #topbar {
            position: absolute; top: 0; left: 0; right: 0; z-index: 10;
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 20px;
            background: linear-gradient(to bottom, rgba(0,0,10,0.9), transparent);
        }
        #topbar h1 { font-size: 1.3em; letter-spacing: 2px; color: #7ecfff; }
        #topbar a { color: #aaa; text-decoration: none; font-size: 0.9em; border: 1px solid #333; padding: 5px 14px; border-radius: 20px; transition: all 0.2s; }
        #topbar a:hover { color: #fff; border-color: #7ecfff; }

        .card {
            position: absolute; z-index: 10;
            background: rgba(0,0,10,0.82);
            border: 1px solid #1a3a5c;
            border-radius: 8px;
        }

        #status { top: 60px; left: 20px; padding: 14px 18px; line-height: 1.9; min-width: 200px; font-size: 0.82em; }
        #status .lbl { color: #5599cc; }
        #status .val { color: #e0f0ff; font-weight: 600; }

        /* ── Zoom controls ── */
        #zoom-ctrl {
            position: absolute; bottom: 30px; left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex; align-items: center; gap: 0;
            background: rgba(0,0,10,0.82); border: 1px solid #1a3a5c; border-radius: 8px;
            overflow: hidden;
        }
        .zoom-btn {
            background: none; border: none; color: #7ecfff;
            font-size: 1.4em; font-weight: 300; width: 42px; height: 38px;
            cursor: pointer; transition: background 0.15s; line-height: 1;
        }
        .zoom-btn:hover { background: rgba(100,180,255,0.15); }
        #zoom-label {
            padding: 0 12px; color: #5599cc; font-size: 0.82em;
            min-width: 70px; text-align: center; user-select: none;
        }

        /* ── Receiver panel ── */
        #recv-panel { top: 270px; left: 20px; padding: 14px 16px; width: 240px; font-size: 0.82em; }
        #recv-panel h3 { color: #7ecfff; letter-spacing: 1px; margin-bottom: 12px; font-size: 1em; }
        .field-row { display: flex; align-items: center; margin-bottom: 8px; gap: 8px; }
        .field-row label { color: #5599cc; width: 32px; font-size: 0.9em; }
        .field-row input {
            flex: 1; background: rgba(0,20,50,0.8); border: 1px solid #1a3a5c;
            color: #e0f0ff; border-radius: 4px; padding: 5px 8px; font-size: 0.9em;
        }
        .field-row input:focus { outline: none; border-color: #7ecfff; }
        .btn-row { display: flex; gap: 6px; margin-top: 10px; }
        .btn { flex: 1; padding: 6px 0; border: none; border-radius: 4px; cursor: pointer; font-size: 0.8em; font-weight: 600; transition: opacity 0.2s; }
        .btn:hover { opacity: 0.82; }
        .btn-set   { background: #1a5a8a; color: #e0f0ff; }
        .btn-geo   { background: #1a6a3a; color: #e0f0ff; }
        .btn-clear { background: #4a1a1a; color: #ffaaaa; }
        #recv-status { margin-top: 8px; font-size: 0.8em; color: #5599cc; min-height: 1.2em; }

        /* ── Satellite panel ── */
        #sat-panel { top: 60px; right: 20px; bottom: 20px; width: 280px; overflow-y: auto; font-size: 0.82em; }
        #sat-panel h3 { padding: 10px 14px; color: #7ecfff; border-bottom: 1px solid #1a3a5c; letter-spacing: 1px; font-size: 0.95em; position: sticky; top: 0; background: rgba(0,0,20,0.97); }
        #panel-sub { padding: 4px 14px 6px; font-size: 0.78em; color: #5599cc; border-bottom: 1px solid #1a3a5c; background: rgba(0,0,20,0.97); position: sticky; top: 37px; line-height: 1.7; }
        #panel-sub .sig-sum { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 3px; }
        #col-header { padding: 5px 14px; border-bottom: 1px solid #1a3a5c; font-size: 0.75em; color: #4477aa; position: sticky; top: 57px; background: rgba(0,0,15,0.97); display: grid; }
        #col-header.no-recv { grid-template-columns: 14px 40px 1fr; }
        #col-header.recv    { grid-template-columns: 14px 40px 52px 42px; }
        .sat-row { padding: 5px 14px; border-bottom: 1px solid rgba(255,255,255,0.04); align-items: start; cursor: pointer; transition: background 0.15s; display: grid; gap: 2px 4px; }
        .sat-row.no-recv { grid-template-columns: 14px 40px 1fr; }
        .sat-row.recv    { grid-template-columns: 14px 40px 52px 42px; }
        .sat-row:hover { background: rgba(100,150,255,0.1); }
        .prn  { color: #7ecfff; font-weight: 700; font-size: 0.88em; line-height: 1.4; }
        .cell { color: #aac; font-size: 0.8em; line-height: 1.5; }
        .dot  { width: 7px; height: 7px; border-radius: 50%; margin-top: 4px; }
        .dot-ok   { background: #00ff88; }
        .dot-glo  { background: #00ddff; }
        .dot-bei  { background: #ffcc00; }
        .dot-gal  { background: #ff9500; }
        .dot-fail { background: #ff4444; }
        /* Signal badges */
        .sigs { display: flex; flex-wrap: wrap; gap: 2px; margin-top: 2px; grid-column: 2 / -1; }
        .sig-b { font-size: 0.68em; padding: 1px 4px; border-radius: 3px; border: 1px solid; white-space: nowrap; font-weight: 600; }
        /* Constellation toggles */
        #const-toggles { display: flex; gap: 6px; }
        .tog-btn {
            padding: 5px 12px; border-radius: 20px; border: 1px solid; cursor: pointer;
            font-size: 0.78em; font-weight: 700; letter-spacing: 1px; transition: all 0.2s;
            opacity: 0.4;
        }
        .tog-btn.active { opacity: 1; }
        .tog-gps { color: #00ff88; border-color: #00ff88; background: rgba(0,255,136,0.08); }
        .tog-gps.active { background: rgba(0,255,136,0.18); }
        .tog-glo { color: #00ddff; border-color: #00ddff; background: rgba(0,221,255,0.08); }
        .tog-glo.active { background: rgba(0,221,255,0.18); }
        .tog-bei { color: #ffcc00; border-color: #ffcc00; background: rgba(255,204,0,0.08); }
        .tog-bei.active { background: rgba(255,204,0,0.18); }
        .tog-gal { color: #ff9500; border-color: #ff9500; background: rgba(255,149,0,0.08); }
        .tog-gal.active { background: rgba(255,149,0,0.18); }

        #tooltip {
            position: absolute; background: rgba(0,5,20,0.93); border: 1px solid #3a6aaa;
            border-radius: 6px; padding: 10px 14px; font-size: 0.8em; pointer-events: none;
            display: none; z-index: 20; line-height: 1.8; min-width: 170px;
        }
        #tooltip .t-prn { color: #7ecfff; font-size: 1.1em; font-weight: 700; margin-bottom: 4px; }
        #tooltip .t-lbl { color: #5599cc; }
        #tooltip .t-val { color: #e0f0ff; }

        #loading { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #000; z-index: 100; }
        #loading .spinner { width: 50px; height: 50px; border: 3px solid #1a3a5c; border-top-color: #7ecfff; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 16px; }
        #loading p { color: #5599cc; letter-spacing: 2px; font-size: 0.9em; }
        @keyframes spin { to { transform: rotate(360deg); } }
        #sat-panel::-webkit-scrollbar { width: 4px; }
        #sat-panel::-webkit-scrollbar-track { background: transparent; }
        #sat-panel::-webkit-scrollbar-thumb { background: #1a3a5c; border-radius: 2px; }
    </style>
</head>
<body>

<div id="loading"><div class="spinner"></div><p>LOADING LIVE DATA...</p></div>
<div id="canvas-container"></div>

<div id="topbar">
    <h1>🛰️ GPS / GLONASS / BeiDou LIVE SKY VIEW</h1>
    <div id="const-toggles">
        <button id="tog-gps" class="tog-btn tog-gps active" onclick="toggleConst('GPS')">GPS</button>
        <button id="tog-glo" class="tog-btn tog-glo active" onclick="toggleConst('GLONASS')">GLO</button>
        <button id="tog-bei" class="tog-btn tog-bei active" onclick="toggleConst('BEIDOU')">BDS</button>
        <button id="tog-gal" class="tog-btn tog-gal active" onclick="toggleConst('GALILEO')">GAL</button>
    </div>
    <a href="/cesium">Cesium View</a>
    <a href="/calculator">⚙ Calculator</a>
</div>

<div class="card" id="status">
    <div><span class="lbl">UTC TIME </span><span class="val" id="st-time">—</span></div>
    <div><span class="lbl">ALMANAC  </span><span class="val" id="st-almanac">—</span></div>
    <div><span class="lbl">GPS      </span><span class="val" id="st-gps">—</span></div>
    <div><span class="lbl">GLONASS  </span><span class="val" id="st-glo">—</span></div>
    <div><span class="lbl">BEIDOU   </span><span class="val" id="st-bei">—</span></div>
    <div><span class="lbl">GALILEO  </span><span class="val" id="st-gal">—</span></div>
    <div><span class="lbl">UPDATE   </span><span class="val">every 5s</span></div>
</div>

<!-- Zoom controls -->
<div id="zoom-ctrl">
    <button class="zoom-btn" onclick="adjustZoom(-1)" title="Zoom in">+</button>
    <div id="zoom-label">zoom</div>
    <button class="zoom-btn" onclick="adjustZoom(1)"  title="Zoom out">−</button>
</div>

<!-- Receiver -->
<div class="card" id="recv-panel">
    <h3>📍 Receiver Location</h3>
    <div class="field-row"><label>Lat</label><input id="inp-lat" type="number" step="0.0001" min="-90"  max="90"   placeholder="e.g. 32.0853"></div>
    <div class="field-row"><label>Lon</label><input id="inp-lon" type="number" step="0.0001" min="-180" max="180"  placeholder="e.g. 34.7818"></div>
    <div class="field-row"><label>Alt m</label><input id="inp-alt" type="number" step="1"  min="0"                placeholder="0"></div>
    <div class="btn-row">
        <button class="btn btn-set"   onclick="setReceiver()">Set</button>
        <button class="btn btn-geo"   onclick="geoLocate()">📡 My Location</button>
        <button class="btn btn-clear" onclick="clearReceiver()">✕ Clear</button>
    </div>
    <div id="recv-status"></div>
</div>

<!-- Satellite list -->
<div class="card" id="sat-panel">
    <h3>SATELLITES</h3>
    <div id="panel-sub">All satellites</div>
    <div id="col-header" class="no-recv">
        <span></span><span>ID</span><span>Lat / Lon</span>
    </div>
    <div id="sat-list"></div>
</div>

<div id="tooltip"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ── Renderer ─────────────────────────────────────────────────────────
const container = document.getElementById('canvas-container');
const renderer  = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x000000);
container.appendChild(renderer.domElement);

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 2000);

// ── Camera state ──────────────────────────────────────────────────────
let rotX = 0.4, rotY = 0.3, zoom = 70;
const ZOOM_MIN = 9, ZOOM_MAX = 120;

function adjustZoom(dir) {
    zoom = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, zoom * (dir < 0 ? 0.8 : 1.25)));
}

function updateZoomLabel() {
    const km = Math.round(zoom * 1000).toLocaleString();
    document.getElementById('zoom-label').textContent = km + ' km';
}

// ── Earth ─────────────────────────────────────────────────────────────
const EARTH_R = 6.371;
let earth;

function buildEarth(texture) {
    earth = new THREE.Mesh(
        new THREE.SphereGeometry(EARTH_R, 64, 64),
        texture
            ? new THREE.MeshPhongMaterial({ map: texture, specular: 0x111133, shininess: 8 })
            : new THREE.MeshPhongMaterial({ color: 0x1a4a8a, emissive: 0x0a1a3a })
    );
    // Align texture to ECEF: Three.js SphereGeometry places U=0.5 at -Z; ECEF X=0°lon → rotate -π/2
    earth.rotation.y = -Math.PI / 2;
    scene.add(earth);
}

new THREE.TextureLoader().load(
    'https://raw.githubusercontent.com/mrdoob/three.js/r128/examples/textures/planets/earth_atmos_2048.jpg',
    tex => buildEarth(tex),
    undefined,
    ()  => buildEarth(null)
);

// Atmosphere
scene.add(new THREE.Mesh(
    new THREE.SphereGeometry(EARTH_R * 1.03, 64, 64),
    new THREE.MeshPhongMaterial({ color: 0x2255aa, transparent: true, opacity: 0.09, side: THREE.FrontSide })
));

// ── Lighting ──────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0x446688, 1.0));
const sunLight = new THREE.DirectionalLight(0xffeedd, 1.6);
sunLight.position.set(50, 20, 30);
scene.add(sunLight);
const fillLight = new THREE.DirectionalLight(0x223355, 0.4);
fillLight.position.set(-40, -10, -20);
scene.add(fillLight);

// ── Coordinate helpers ────────────────────────────────────────────────
function e2t(x, y, z) { return new THREE.Vector3(x / 1e6, z / 1e6, y / 1e6); }

function llhToEcef(lat, lon, altM) {
    const a = 6378137, f = 1 / 298.257223563, e2 = 2*f - f*f;
    const lr = lat * Math.PI / 180, lo = lon * Math.PI / 180;
    const sl = Math.sin(lr), cl = Math.cos(lr);
    const N  = a / Math.sqrt(1 - e2 * sl * sl);
    return { x: (N + altM) * cl * Math.cos(lo), y: (N + altM) * cl * Math.sin(lo), z: (N*(1-e2)+altM)*sl };
}

function rangeElev(recv, satX, satY, satZ) {
    const dx = satX - recv.x, dy = satY - recv.y, dz = satZ - recv.z;
    const rangM = Math.sqrt(dx*dx + dy*dy + dz*dz);
    const rLen  = Math.sqrt(recv.x*recv.x + recv.y*recv.y + recv.z*recv.z);
    const dot   = (dx*recv.x + dy*recv.y + dz*recv.z) / (rangM * rLen);
    return { range: rangM / 1000, elev: Math.asin(Math.max(-1, Math.min(1, dot))) * 180 / Math.PI };
}

// ── Sprite factories ──────────────────────────────────────────────────
const ZOOM_REF  = 70;
const PRN_BASE  = [3.2, 1.2];
const LINK_BASE = [7.0, 2.3];

function satColor(constellation, healthy) {
    if (constellation === 'GLONASS') return '#00ddff';
    if (constellation === 'BEIDOU')  return '#ffcc00';
    if (constellation === 'GALILEO') return '#ff9500';
    return healthy ? '#00ff88' : '#ff5555';
}

function satMat(constellation, healthy) {
    if (constellation === 'GLONASS') return MAT_GLO;
    if (constellation === 'BEIDOU')  return MAT_BEI;
    if (constellation === 'GALILEO') return MAT_GAL;
    return healthy ? MAT_OK : MAT_FAIL;
}

function satGhostMat(constellation, healthy) {
    if (constellation === 'GLONASS') return MAT_GLO_G;
    if (constellation === 'BEIDOU')  return MAT_BEI_G;
    if (constellation === 'GALILEO') return MAT_GAL_G;
    return healthy ? MAT_OK_G : MAT_FAIL_G;
}

function makePrnSprite(label, healthy, constellation) {
    const c = document.createElement('canvas');
    c.width = 160; c.height = 60;
    const ctx = c.getContext('2d');
    ctx.font = 'bold 46px monospace';
    ctx.fillStyle = satColor(constellation, healthy);
    ctx.fillText(label, 4, 50);
    const spr = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(c), transparent: true, depthWrite: false }));
    spr.scale.set(PRN_BASE[0], PRN_BASE[1], 1);
    spr.position.set(0.6, 0.25, 0);
    return spr;
}

function makeLinkSprite(range, elev) {
    const c = document.createElement('canvas');
    c.width = 300; c.height = 110;
    const ctx = c.getContext('2d');
    const col = elev > 45 ? '#00ff88' : elev > 20 ? '#ffdd00' : '#ff8800';
    ctx.font = 'bold 44px monospace';
    ctx.fillStyle = col;
    ctx.fillText(Math.round(range).toLocaleString() + ' km', 6, 48);
    ctx.font = '40px monospace';
    ctx.fillStyle = '#ccddff';
    ctx.fillText(elev.toFixed(1) + '\u00b0', 6, 98);
    const spr = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(c), transparent: true, depthWrite: false }));
    spr.scale.set(LINK_BASE[0], LINK_BASE[1], 1);
    return spr;
}

// ── Signal data ───────────────────────────────────────────────────────
const GPS_SIGNAL_MAP = {
    // Block IIR — L1CA only
    11:['L1CA'], 13:['L1CA'], 14:['L1CA'], 20:['L1CA'], 21:['L1CA'], 22:['L1CA'],
    // Block IIR-M — L1CA + L2C
    12:['L1CA','L2C'], 15:['L1CA','L2C'], 17:['L1CA','L2C'], 29:['L1CA','L2C'], 31:['L1CA','L2C'],
    // Block IIF — L1CA + L2C + L5
    1:['L1CA','L2C','L5'], 3:['L1CA','L2C','L5'], 6:['L1CA','L2C','L5'], 8:['L1CA','L2C','L5'],
    9:['L1CA','L2C','L5'], 10:['L1CA','L2C','L5'], 24:['L1CA','L2C','L5'], 25:['L1CA','L2C','L5'],
    26:['L1CA','L2C','L5'], 27:['L1CA','L2C','L5'], 30:['L1CA','L2C','L5'], 32:['L1CA','L2C','L5'],
    // Block IIIA — L1CA + L1C + L2C + L5
    2:['L1CA','L1C','L2C','L5'], 4:['L1CA','L1C','L2C','L5'], 5:['L1CA','L1C','L2C','L5'],
    7:['L1CA','L1C','L2C','L5'], 18:['L1CA','L1C','L2C','L5'], 23:['L1CA','L1C','L2C','L5'],
    28:['L1CA','L1C','L2C','L5'],
};
const SIG_STYLE = {
    L1CA:'color:#4e9eff;border-color:#4e9eff66', L1C:'color:#82c0ff;border-color:#82c0ff66',
    L2C:'color:#2ec4a9;border-color:#2ec4a966',  L5:'color:#b87fff;border-color:#b87fff66',
    L1OF:'color:#00ddff;border-color:#00ddff66', L2OF:'color:#0099bb;border-color:#0099bb66',
    L3OC:'color:#00ffdd;border-color:#00ffdd66',
    B1I:'color:#ffcc00;border-color:#ffcc0066',  B2I:'color:#ffaa00;border-color:#ffaa0066',
    B3I:'color:#ff8800;border-color:#ff880066',  B1C:'color:#ffe066;border-color:#ffe06666',
    B2a:'color:#ffdd44;border-color:#ffdd4466',
    E1B:'color:#ff9500;border-color:#ff950066',  E5a:'color:#ffb84d;border-color:#ffb84d66',
    E5b:'color:#ffcc80;border-color:#ffcc8066',  E6: 'color:#ff7700;border-color:#ff770066',
};
function getSignals(sat) {
    if (sat.constellation === 'GPS') return GPS_SIGNAL_MAP[sat.prn] || ['L1CA'];
    if (sat.constellation === 'GLONASS') {
        const n = (sat.name || '').toUpperCase();
        return n.includes('-K') ? ['L1OF','L2OF','L3OC'] : ['L1OF','L2OF'];
    }
    if (sat.constellation === 'BEIDOU') {
        const n = (sat.name || '').toUpperCase();
        return (n.includes('BEIDOU-3') || n.includes('BDS-3')) ? ['B1C','B2a','B3I'] : ['B1I','B2I','B3I'];
    }
    if (sat.constellation === 'GALILEO') {
        const n = (sat.name || '').toUpperCase();
        return n.includes('IOV') ? ['E1B','E5a','E5b'] : ['E1B','E5a','E5b','E6'];
    }
    return [];
}
function sigBadges(signals) {
    return '<div class="sigs">' + signals.map(s => {
        const st = SIG_STYLE[s] || 'color:#aaa;border-color:#555';
        return `<span class="sig-b" style="${st}">${s}</span>`;
    }).join('') + '</div>';
}

// ── Constellation visibility ──────────────────────────────────────────
const enabledConst = { GPS: true, GLONASS: true, BEIDOU: true, GALILEO: true };
function toggleConst(c) {
    enabledConst[c] = !enabledConst[c];
    const id = c === 'GPS' ? 'tog-gps' : c === 'GLONASS' ? 'tog-glo' : c === 'BEIDOU' ? 'tog-bei' : 'tog-gal';
    document.getElementById(id).classList.toggle('active', enabledConst[c]);
    for (const [key, obj] of Object.entries(sats)) {
        const d = satData[key];
        if (d && d.constellation === c) {
            obj.group.visible = enabledConst[c];
            obj.trail.line.visible = enabledConst[c];
        }
    }
    for (const [key, link] of Object.entries(links)) {
        const d = satData[key];
        if (d && d.constellation === c) {
            link.line.visible = enabledConst[c];
            link.sprite.visible = enabledConst[c];
        }
    }
    updatePanel(lastSatellites);
}

// ── Satellite objects ─────────────────────────────────────────────────
const SAT_GEO  = new THREE.SphereGeometry(0.14, 8, 8);
const MAT_OK   = new THREE.MeshPhongMaterial({ color: 0x00ff88, emissive: 0x006633 });
const MAT_FAIL = new THREE.MeshPhongMaterial({ color: 0xff4444, emissive: 0x661111 });
const MAT_GLO  = new THREE.MeshPhongMaterial({ color: 0x00ddff, emissive: 0x005566 });
const MAT_BEI  = new THREE.MeshPhongMaterial({ color: 0xffcc00, emissive: 0x664400 });
const MAT_GAL  = new THREE.MeshPhongMaterial({ color: 0xff9500, emissive: 0x663300 });

// Far-side ghost materials — depthTest off so they bleed through Earth
const GHOST_OPTS = { transparent: true, opacity: 0.18, depthTest: false, depthWrite: false };
const MAT_OK_G   = new THREE.MeshPhongMaterial({ color: 0x00ff88, emissive: 0x003322, ...GHOST_OPTS });
const MAT_FAIL_G = new THREE.MeshPhongMaterial({ color: 0xff4444, emissive: 0x330000, ...GHOST_OPTS });
const MAT_GLO_G  = new THREE.MeshPhongMaterial({ color: 0x00ddff, emissive: 0x002233, ...GHOST_OPTS });
const MAT_BEI_G  = new THREE.MeshPhongMaterial({ color: 0xffcc00, emissive: 0x332200, ...GHOST_OPTS });
const MAT_GAL_G  = new THREE.MeshPhongMaterial({ color: 0xff9500, emissive: 0x331100, ...GHOST_OPTS });
const TRAIL_MAX = 80;
const sats = {}, satData = {};

function makeTrail(healthy, constellation) {
    const buf = new Float32Array(TRAIL_MAX * 3);
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(buf, 3));
    geo.setDrawRange(0, 0);
    const color = constellation === 'GLONASS' ? 0x0099cc
                : constellation === 'BEIDOU'  ? 0xcc9900
                : constellation === 'GALILEO' ? 0xcc6600
                : (healthy ? 0x00cc66 : 0xcc3333);
    const line = new THREE.Line(geo, new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0.45 }));
    return { line, pts: [] };
}

function pushTrail(trail, pos) {
    trail.pts.push(pos.x, pos.y, pos.z);
    if (trail.pts.length > TRAIL_MAX * 3) trail.pts.splice(0, 3);
    const attr = trail.line.geometry.attributes.position;
    const n = trail.pts.length / 3;
    for (let i = 0; i < n; i++) attr.setXYZ(i, trail.pts[i*3], trail.pts[i*3+1], trail.pts[i*3+2]);
    attr.needsUpdate = true;
    trail.line.geometry.setDrawRange(0, n);
}

// ── Receiver & links ──────────────────────────────────────────────────
let receiver = null, recvMarker = null;
const links = {};

// RF line-of-sight mask: the Earth's surface is the only obstruction.
// For a receiver at altitude h, the tangent-to-Earth line depression below
// local horizontal is arccos(R/(R+h)).  At h=0 this gives 0° (horizon);
// at altitude the mask becomes negative (sats visible below the horizon).
const EARTH_R_M = 6378137;
function elevMask() {
    if (!receiver) return 0;
    const h = Math.max(0, receiver.alt);
    return -Math.acos(EARTH_R_M / (EARTH_R_M + h)) * 180 / Math.PI;
}

function refreshLinks(satellites) {
    for (const k of Object.keys(links)) { scene.remove(links[k].line); scene.remove(links[k].sprite); delete links[k]; }
    if (!receiver) return;
    const mask = elevMask();
    const rPos = e2t(receiver.ecef.x, receiver.ecef.y, receiver.ecef.z);
    for (const sat of satellites) {
        if (!enabledConst[sat.constellation]) continue;
        const { range, elev } = rangeElev(receiver.ecef, sat.x, sat.y, sat.z);
        if (elev < mask) continue;
        const sPos = e2t(sat.x, sat.y, sat.z);
        const col  = elev > 45 ? 0x00ff88 : elev > 20 ? 0xffdd00 : 0xff8800;
        const line = new THREE.Line(
            new THREE.BufferGeometry().setFromPoints([rPos, sPos]),
            new THREE.LineBasicMaterial({ color: col, transparent: true, opacity: 0.65 })
        );
        scene.add(line);
        const sprite = makeLinkSprite(range, elev);
        sprite.position.lerpVectors(rPos, sPos, 0.5);
        scene.add(sprite);
        links[sat.label] = { line, sprite };
    }
}

function placeRecvMarker(ecef) {
    if (recvMarker) scene.remove(recvMarker);
    const pos = e2t(ecef.x, ecef.y, ecef.z);
    pos.normalize().multiplyScalar(EARTH_R * 1.02);
    recvMarker = new THREE.Mesh(
        new THREE.SphereGeometry(0.2, 8, 8),
        new THREE.MeshPhongMaterial({ color: 0xffaa00, emissive: 0xcc6600 })
    );
    recvMarker.position.copy(pos);
    scene.add(recvMarker);
}

function faceReceiver(ecef) {
    const p = new THREE.Vector3(ecef.x / 1e6, ecef.z / 1e6, ecef.y / 1e6).normalize();
    rotX = Math.asin(Math.max(-1, Math.min(1, p.y)));
    rotY = Math.atan2(p.x, p.z);
}

function setReceiver() {
    const lat = parseFloat(document.getElementById('inp-lat').value);
    const lon = parseFloat(document.getElementById('inp-lon').value);
    const alt = parseFloat(document.getElementById('inp-alt').value) || 0;
    if (isNaN(lat) || isNaN(lon) || lat < -90 || lat > 90 || lon < -180 || lon > 180) {
        document.getElementById('recv-status').textContent = '⚠ Invalid coordinates'; return;
    }
    const ecef = llhToEcef(lat, lon, alt);
    receiver = { ecef, lat, lon, alt };
    placeRecvMarker(ecef);
    faceReceiver(ecef);
    document.getElementById('recv-status').textContent = lat.toFixed(4) + '°, ' + lon.toFixed(4) + '°';
    if (lastSatellites.length) { refreshLinks(lastSatellites); updatePanel(lastSatellites); }
}

function geoLocate() {
    if (!navigator.geolocation) { document.getElementById('recv-status').textContent = '⚠ Geolocation unavailable'; return; }
    document.getElementById('recv-status').textContent = '⏳ Locating…';
    navigator.geolocation.getCurrentPosition(pos => {
        const { latitude: lat, longitude: lon, altitude: alt } = pos.coords;
        document.getElementById('inp-lat').value = lat.toFixed(6);
        document.getElementById('inp-lon').value = lon.toFixed(6);
        document.getElementById('inp-alt').value = Math.round(alt || 0);
        setReceiver();
    }, () => { document.getElementById('recv-status').textContent = '⚠ Location denied'; });
}

function clearReceiver() {
    receiver = null;
    if (recvMarker) { scene.remove(recvMarker); recvMarker = null; }
    for (const k of Object.keys(links)) { scene.remove(links[k].line); scene.remove(links[k].sprite); delete links[k]; }
    document.getElementById('recv-status').textContent = '';
    updatePanel(lastSatellites);
}

// ── Panel ─────────────────────────────────────────────────────────────
let lastSatellites = [];

function updatePanel(satsArr) {
    const sub  = document.getElementById('panel-sub');
    const hdr  = document.getElementById('col-header');
    const lst  = document.getElementById('sat-list');
    const vis0 = satsArr.filter(s => enabledConst[s.constellation]);
    if (!receiver) {
        sub.textContent = 'All satellites (' + vis0.length + ')';
        hdr.className   = 'no-recv';
        hdr.innerHTML   = '<span></span><span>ID</span><span>Lat / Lon</span>';
        lst.innerHTML   = [...vis0].sort((a, b) => {
            if (a.constellation !== b.constellation) return a.constellation < b.constellation ? -1 : 1;
            return a.prn - b.prn;
        }).map(s => {
            const dotCls   = s.constellation === 'GLONASS' ? 'dot-glo' : s.constellation === 'BEIDOU' ? 'dot-bei' : s.constellation === 'GALILEO' ? 'dot-gal' : (s.healthy ? 'dot-ok' : 'dot-fail');
            const prnColor = satColor(s.constellation, s.healthy);
            return `<div class="sat-row no-recv" onmouseenter="hlSat('${s.label}')" onmouseleave="clearHl()">
                <div><div class="dot ${dotCls}"></div></div>
                <div class="prn" style="color:${prnColor}">${s.label}</div>
                <div class="cell">${s.lat}°<br>${s.lon}°</div>
                ${sigBadges(getSignals(s))}
            </div>`;
        }).join('');
    } else {
        const mask = elevMask();
        const vis = vis0
            .map(s => ({ ...s, ...rangeElev(receiver.ecef, s.x, s.y, s.z) }))
            .filter(s => s.elev >= mask)
            .sort((a, b) => b.elev - a.elev);
        const sigCount = {}, constCount = { GPS: 0, GLONASS: 0, BEIDOU: 0, GALILEO: 0 };
        let totalSigs = 0;
        for (const s of vis) {
            constCount[s.constellation]++;
            for (const sig of getSignals(s)) {
                sigCount[sig] = (sigCount[sig] || 0) + 1;
                totalSigs++;
            }
        }
        const sigSummary = Object.entries(sigCount).sort((a,b) => a[0].localeCompare(b[0]))
            .map(([sig, n]) => { const st = SIG_STYLE[sig] || 'color:#aaa;border-color:#555'; return `<span class="sig-b" style="${st}">${sig} ×${n}</span>`; }).join('');
        const constSummary = ['GPS', 'GLONASS', 'BEIDOU', 'GALILEO'].filter(c => constCount[c] > 0)
            .map(c => `<span style="color:${satColor(c, true)}">${c}: ${constCount[c]}</span>`).join(' • ');
        sub.innerHTML = 'In view: ' + vis.length + ' satellite' + (vis.length !== 1 ? 's' : '') + ' (' + constSummary + ')' +
            (sigSummary ? '<div class="sig-sum">Signals: ' + totalSigs + ' • ' + sigSummary + '</div>' : '');
        hdr.className   = 'recv';
        hdr.innerHTML   = '<span></span><span>ID</span><span>Range</span><span>Elev</span>';
        lst.innerHTML   = vis.map(s => {
            const c = s.elev > 45 ? '#00ff88' : s.elev > 20 ? '#ffdd00' : '#ff8800';
            const dotCls   = s.constellation === 'GLONASS' ? 'dot-glo' : s.constellation === 'BEIDOU' ? 'dot-bei' : s.constellation === 'GALILEO' ? 'dot-gal' : (s.healthy ? 'dot-ok' : 'dot-fail');
            const prnColor = satColor(s.constellation, s.healthy);
            return `<div class="sat-row recv" onmouseenter="hlSat('${s.label}')" onmouseleave="clearHl()">
                <div><div class="dot ${dotCls}"></div></div>
                <div class="prn" style="color:${prnColor}">${s.label}</div>
                <div class="cell">${Math.round(s.range).toLocaleString()} km</div>
                <div class="cell" style="color:${c}">${s.elev.toFixed(1)}°</div>
                ${sigBadges(getSignals(s))}
            </div>`;
        }).join('');
    }
}

// ── Satellite update ──────────────────────────────────────────────────
function updateSatellites(satellites) {
    lastSatellites = satellites;
    const seen = new Set();
    for (const sat of satellites) {
        seen.add(sat.label);
        satData[sat.label] = sat;
        const pos = e2t(sat.x, sat.y, sat.z);
        if (!sats[sat.label]) {
            const sphere = new THREE.Mesh(SAT_GEO, satMat(sat.constellation, sat.healthy));
            sphere.userData.label = sat.label;
            const label = makePrnSprite(sat.label, sat.healthy, sat.constellation);
            const group = new THREE.Group();
            group.add(sphere); group.add(label);
            scene.add(group);
            const trail = makeTrail(sat.healthy, sat.constellation);
            scene.add(trail.line);
            sats[sat.label] = { group, sphere, label, trail };
        }
        sats[sat.label].group.position.copy(pos);
        sats[sat.label].sphere.material = satMat(sat.constellation, sat.healthy);
        sats[sat.label].group.visible      = enabledConst[sat.constellation];
        sats[sat.label].trail.line.visible = enabledConst[sat.constellation];
        pushTrail(sats[sat.label].trail, pos);
    }
    for (const key of Object.keys(sats)) {
        if (!seen.has(key)) {
            scene.remove(sats[key].group); scene.remove(sats[key].trail.line);
            delete sats[key]; delete satData[key];
        }
    }
    refreshLinks(satellites);
    updatePanel(satellites);
}

// ── Raycasting ────────────────────────────────────────────────────────
const raycaster = new THREE.Raycaster();
const mouse     = new THREE.Vector2();
const tooltip   = document.getElementById('tooltip');

function checkHover(cx, cy) {
    mouse.x =  (cx / window.innerWidth)  * 2 - 1;
    mouse.y = -(cy / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    const hits = raycaster.intersectObjects(Object.values(sats).map(s => s.sphere));
    if (hits.length) {
        const lbl = hits[0].object.userData.label;
        const d   = satData[lbl];
        const prnColor = satColor(d.constellation, d.healthy);
        let extra = '';
        if (receiver) {
            const { range, elev } = rangeElev(receiver.ecef, d.x, d.y, d.z);
            extra = elev >= elevMask()
                ? `<div><span class="t-lbl">Range: </span><span class="t-val">${Math.round(range).toLocaleString()} km</span></div>
                   <div><span class="t-lbl">Elev:  </span><span class="t-val">${elev.toFixed(1)}°</span></div>`
                : `<div style="color:#ff8800">Below horizon</div>`;
        }
        tooltip.style.display = 'block';
        tooltip.style.left = (cx + 14) + 'px';
        tooltip.style.top  = (cy - 10) + 'px';
        tooltip.innerHTML  = `<div class="t-prn" style="color:${prnColor}">${lbl}</div>
            <div><span class="t-lbl">Type: </span><span class="t-val">${d.constellation}</span></div>
            <div><span class="t-lbl">Health: </span><span class="t-val">${d.healthy ? '✓ Healthy' : '✗ Unhealthy'}</span></div>
            <div><span class="t-lbl">Lat: </span><span class="t-val">${d.lat}°</span></div>
            <div><span class="t-lbl">Lon: </span><span class="t-val">${d.lon}°</span></div>
            <div><span class="t-lbl">Alt: </span><span class="t-val">${d.alt_km} km</span></div>${extra}`;
    } else {
        tooltip.style.display = 'none';
    }
}

// ── Drag / zoom ───────────────────────────────────────────────────────
let isDragging = false, prevX = 0, prevY = 0;
renderer.domElement.addEventListener('mousedown', e  => { isDragging = true; prevX = e.clientX; prevY = e.clientY; });
renderer.domElement.addEventListener('mouseup',   ()  => isDragging = false);
renderer.domElement.addEventListener('mouseleave',()  => isDragging = false);
renderer.domElement.addEventListener('mousemove', e  => {
    if (isDragging) {
        rotY += (e.clientX - prevX) * 0.005;
        rotX += (e.clientY - prevY) * 0.005;
        rotX = Math.max(-Math.PI/2, Math.min(Math.PI/2, rotX));
        prevX = e.clientX; prevY = e.clientY;
    }
    checkHover(e.clientX, e.clientY);
});
renderer.domElement.addEventListener('wheel', e => {
    zoom = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, zoom * (e.deltaY > 0 ? 1.08 : 0.93)));
});

function hlSat(lbl)  { if (sats[lbl]) sats[lbl].sphere.scale.setScalar(2.2); }
function clearHl()   { for (const o of Object.values(sats)) o.sphere.scale.setScalar(1.0); }

// ── Fetch ─────────────────────────────────────────────────────────────
async function fetchLive() {
    try {
        const res  = await fetch('/api/live-positions');
        const data = await res.json();
        document.getElementById('loading').style.display = 'none';
        if (!res.ok) { console.error('API error:', data.error); return; }
        const gpsSats = data.satellites.filter(s => s.constellation === 'GPS');
        const gloSats = data.satellites.filter(s => s.constellation === 'GLONASS');
        const beiSats = data.satellites.filter(s => s.constellation === 'BEIDOU');
        const galSats = data.satellites.filter(s => s.constellation === 'GALILEO');
        document.getElementById('st-time').textContent    = data.time;
        document.getElementById('st-almanac').textContent = data.almanac_date || '—';
        document.getElementById('st-gps').textContent     = gpsSats.length;
        document.getElementById('st-glo').textContent     = gloSats.length;
        document.getElementById('st-bei').textContent     = beiSats.length;
        document.getElementById('st-gal').textContent     = galSats.length;
        updateSatellites(data.satellites);
    } catch (e) {
        console.error('fetchLive error:', e);
        document.getElementById('loading').style.display = 'none';
    }
}

// ── Render loop ───────────────────────────────────────────────────────
function animate() {
    requestAnimationFrame(animate);

    camera.position.x = zoom * Math.sin(rotY) * Math.cos(rotX);
    camera.position.y = zoom * Math.sin(rotX);
    camera.position.z = zoom * Math.cos(rotY) * Math.cos(rotX);
    camera.lookAt(0, 0, 0);

    const sf = zoom / ZOOM_REF;
    const camNorm = camera.position.clone().normalize();
    for (const [key, obj] of Object.entries(sats)) {
        const isFar = obj.group.position.dot(camNorm) < 0;
        const d = satData[key];
        obj.sphere.material = isFar ? satGhostMat(d.constellation, d.healthy) : satMat(d.constellation, d.healthy);
        obj.sphere.renderOrder = isFar ? 0 : 1;
        obj.label.material.opacity = isFar ? 0.15 : 1.0;
        obj.label.renderOrder = isFar ? 0 : 2;
        obj.label.scale.set(PRN_BASE[0] * sf, PRN_BASE[1] * sf, 1);
    }
    for (const lnk of Object.values(links)) {
        lnk.sprite.scale.set(LINK_BASE[0] * sf, LINK_BASE[1] * sf, 1);
    }

    updateZoomLabel();
    renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

fetchLive();
setInterval(fetchLive, 5000);
animate();
</script>
