<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPS / GLONASS / BeiDou / Galileo — Cesium View</title>
    <script>window.CESIUM_BASE_URL = 'https://cesium.com/downloads/cesiumjs/releases/1.95/Build/Cesium/';</script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.95/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.95/Build/Cesium/Cesium.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #e0e0ff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; overflow: hidden; height: 100vh; }
        #cesiumContainer { position: absolute; inset: 0; }
        .cesium-widget-credits { display: none !important; }

        #topbar {
            position: absolute; top: 0; left: 0; right: 0; z-index: 10;
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 20px;
            background: linear-gradient(to bottom, rgba(0,0,10,0.9), transparent);
        }
        #topbar h1 { font-size: 1.2em; letter-spacing: 2px; color: #7ecfff; }
        #topbar-right { display: flex; align-items: center; gap: 8px; }
        #topbar a {
            color: #aaa; text-decoration: none; font-size: 0.85em;
            border: 1px solid #333; padding: 5px 12px; border-radius: 20px; transition: all 0.2s;
        }
        #topbar a:hover { color: #fff; border-color: #7ecfff; }
        #topbar a.active-view { color: #7ecfff; border-color: #7ecfff; background: rgba(126,207,255,0.1); }

        .card {
            position: absolute; z-index: 10;
            background: rgba(0,0,10,0.82);
            border: 1px solid #1a3a5c;
            border-radius: 8px;
        }

        #status { top: 60px; left: 20px; padding: 14px 18px; line-height: 1.9; min-width: 200px; font-size: 0.82em; }
        #status .lbl { color: #5599cc; }
        #status .val { color: #e0f0ff; font-weight: 600; }

        #recv-panel { top: 325px; left: 20px; padding: 14px 16px; width: 240px; font-size: 0.82em; }
        #recv-panel h3 { color: #7ecfff; letter-spacing: 1px; margin-bottom: 12px; font-size: 1em; }
        .field-row { display: flex; align-items: center; margin-bottom: 8px; gap: 8px; }
        .field-row label { color: #5599cc; width: 36px; font-size: 0.9em; }
        .field-row input {
            flex: 1; background: rgba(0,20,50,0.8); border: 1px solid #1a3a5c;
            color: #e0f0ff; border-radius: 4px; padding: 5px 8px; font-size: 0.9em;
        }
        .field-row input:focus { outline: none; border-color: #7ecfff; }
        .btn-row { display: flex; gap: 6px; margin-top: 10px; }
        .btn { flex: 1; padding: 6px 0; border: none; border-radius: 4px; cursor: pointer; font-size: 0.8em; font-weight: 600; transition: opacity 0.2s; }
        .btn:hover { opacity: 0.82; }
        .btn-set   { background: #1a5a8a; color: #e0f0ff; }
        .btn-geo   { background: #1a6a3a; color: #e0f0ff; }
        .btn-clear { background: #4a1a1a; color: #ffaaaa; }
        #recv-status { margin-top: 8px; font-size: 0.8em; color: #5599cc; min-height: 1.2em; }
        #btn-2d { color: #aaa; background: none; font-family: inherit; font-size: 0.85em; border: 1px solid #333; padding: 5px 12px; border-radius: 20px; cursor: pointer; transition: all 0.2s; }
        #btn-2d:hover:not(:disabled) { color: #fff; border-color: #7ecfff; }
        #btn-2d.active { color: #7ecfff; border-color: #7ecfff; background: rgba(126,207,255,0.1); }
        #btn-2d:disabled { opacity: 0.3; cursor: not-allowed; }
        #sky-canvas { display: none; position: absolute; inset: 0; z-index: 5; }

        #sat-panel { top: 60px; right: 20px; bottom: 20px; width: 280px; font-size: 0.82em; display: flex; flex-direction: column; overflow: hidden; }
        #sat-panel h3 { padding: 10px 14px; color: #7ecfff; border-bottom: 1px solid #1a3a5c; letter-spacing: 1px; font-size: 0.95em; flex-shrink: 0; }
        #panel-sub { padding: 4px 14px 6px; font-size: 0.78em; color: #5599cc; border-bottom: 1px solid #1a3a5c; line-height: 1.7; flex-shrink: 0; }
        #panel-sub .sig-sum { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 3px; }
        #col-header { padding: 5px 14px; border-bottom: 1px solid #1a3a5c; font-size: 0.75em; color: #4477aa; display: grid; flex-shrink: 0; }
        #sat-list { overflow-y: auto; flex: 1; min-height: 0; }
        #col-header.no-recv { grid-template-columns: 14px 40px 1fr; }
        #col-header.recv    { grid-template-columns: 14px 40px 52px 42px; }
        .sat-row { padding: 5px 14px; border-bottom: 1px solid rgba(255,255,255,0.04); align-items: start; cursor: pointer; transition: background 0.15s; display: grid; gap: 2px 4px; }
        .sat-row.no-recv { grid-template-columns: 14px 40px 1fr; }
        .sat-row.recv    { grid-template-columns: 14px 40px 52px 42px; }
        .sat-row:hover { background: rgba(100,150,255,0.1); }
        .prn  { color: #7ecfff; font-weight: 700; font-size: 0.88em; line-height: 1.4; }
        .cell { color: #aac; font-size: 0.8em; line-height: 1.5; }
        .dot  { width: 7px; height: 7px; border-radius: 50%; margin-top: 4px; }
        .dot-ok   { background: #00ff88; }
        .dot-glo  { background: #00ddff; }
        .dot-bei  { background: #ffcc00; }
        .dot-gal  { background: #ff9500; }
        .dot-fail { background: #ff4444; }
        .sigs { display: flex; flex-wrap: wrap; gap: 2px; margin-top: 2px; grid-column: 2 / -1; }
        .sig-b { font-size: 0.68em; padding: 1px 4px; border-radius: 3px; border: 1px solid; white-space: nowrap; font-weight: 600; }

        #const-toggles { display: flex; gap: 6px; }
        .tog-btn { padding: 5px 12px; border-radius: 20px; border: 1px solid; cursor: pointer; font-size: 0.78em; font-weight: 700; letter-spacing: 1px; transition: all 0.2s; opacity: 0.4; }
        .tog-btn.active { opacity: 1; }
        .tog-gps { color: #00ff88; border-color: #00ff88; background: rgba(0,255,136,0.08); }
        .tog-gps.active { background: rgba(0,255,136,0.18); }
        .tog-glo { color: #00ddff; border-color: #00ddff; background: rgba(0,221,255,0.08); }
        .tog-glo.active { background: rgba(0,221,255,0.18); }
        .tog-bei { color: #ffcc00; border-color: #ffcc00; background: rgba(255,204,0,0.08); }
        .tog-bei.active { background: rgba(255,204,0,0.18); }
        .tog-gal { color: #ff9500; border-color: #ff9500; background: rgba(255,149,0,0.08); }
        .tog-gal.active { background: rgba(255,149,0,0.18); }

        #tooltip {
            position: absolute; background: rgba(0,5,20,0.93); border: 1px solid #3a6aaa;
            border-radius: 6px; padding: 10px 14px; font-size: 0.8em; pointer-events: none;
            display: none; z-index: 20; line-height: 1.8; min-width: 170px;
        }
        #tooltip .t-prn { color: #7ecfff; font-size: 1.1em; font-weight: 700; margin-bottom: 4px; }
        #tooltip .t-lbl { color: #5599cc; }
        #tooltip .t-val { color: #e0f0ff; }

        #loading { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #000; z-index: 100; }
        #loading .spinner { width: 50px; height: 50px; border: 3px solid #1a3a5c; border-top-color: #7ecfff; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 16px; }
        #loading p { color: #5599cc; letter-spacing: 2px; font-size: 0.9em; }
        @keyframes spin { to { transform: rotate(360deg); } }
        #sat-panel::-webkit-scrollbar { width: 4px; }
        #sat-panel::-webkit-scrollbar-track { background: transparent; }
        #sat-panel::-webkit-scrollbar-thumb { background: #1a3a5c; border-radius: 2px; }

        /* ── Full-page satellite detail ───────────────────────────────── */
        #sat-page {
            display: none; position: fixed; inset: 0; z-index: 50;
            background: #000008; color: #e0e0ff;
            flex-direction: column;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        #sat-page.open { display: flex; }
        #sp-bar {
            display: flex; align-items: center; gap: 12px; padding: 10px 20px;
            border-bottom: 1px solid #1a3a5c; background: rgba(0,0,15,0.98);
            flex-shrink: 0;
        }
        #sp-back {
            background: none; border: 1px solid #1a3a5c; color: #7ecfff;
            cursor: pointer; padding: 6px 16px; border-radius: 20px; font-size: 0.82em;
            transition: all 0.2s; font-family: inherit; white-space: nowrap;
        }
        #sp-back:hover { border-color: #7ecfff; background: rgba(126,207,255,0.1); }
        #sp-sat-label { font-size: 1.25em; font-weight: 700; letter-spacing: 2px; }
        #sp-sat-const { font-size: 0.82em; color: #5599cc; }
        #sp-bar-spacer { flex: 1; }
        .sp-nav-btn {
            background: none; border: 1px solid #1a3a5c; color: #aac;
            cursor: pointer; padding: 5px 14px; border-radius: 4px;
            font-size: 0.82em; transition: all 0.2s; font-family: inherit;
        }
        .sp-nav-btn:hover:not(:disabled) { border-color: #7ecfff; color: #7ecfff; }
        .sp-nav-btn:disabled { opacity: 0.3; cursor: default; }
        #sp-nav-pos { color: #5599cc; font-size: 0.78em; min-width: 52px; text-align: center; }
        #sp-main { display: flex; flex: 1; overflow: hidden; }
        #sp-sidebar {
            width: 200px; flex-shrink: 0; border-right: 1px solid #1a3a5c;
            overflow-y: auto; background: rgba(0,0,12,0.6); font-size: 0.8em;
        }
        #sp-sidebar-hdr {
            padding: 9px 14px; color: #5599cc; font-size: 0.78em; letter-spacing: 1px;
            text-transform: uppercase; border-bottom: 1px solid #1a3a5c;
            position: sticky; top: 0; background: #000010;
        }
        .sp-row {
            padding: 7px 12px; cursor: pointer; display: flex; align-items: center;
            gap: 8px; border-bottom: 1px solid rgba(255,255,255,0.04);
            transition: background 0.15s;
        }
        .sp-row:hover { background: rgba(100,150,255,0.1); }
        .sp-row.sp-active { background: rgba(100,180,255,0.15); border-left: 2px solid #7ecfff; padding-left: 10px; }
        .sp-row .sp-lbl { font-weight: 700; font-size: 0.92em; flex: 1; }
        .sp-row .sp-info { color: #5599cc; font-size: 0.76em; white-space: nowrap; }
        #sp-sidebar::-webkit-scrollbar { width: 3px; }
        #sp-sidebar::-webkit-scrollbar-thumb { background: #1a3a5c; }
        #sp-const-bar {
            display: flex; gap: 8px; padding: 8px 20px; flex-shrink: 0;
            border-bottom: 1px solid #1a3a5c; background: rgba(0,0,15,0.98);
        }
        .sp-tog-all { color: #aaaacc; border-color: #aaaacc; background: rgba(170,170,204,0.08); }
        .sp-tog-all.active { background: rgba(170,170,204,0.18); }
        #sp-content {
            flex: 1; overflow-y: auto; padding: 18px 22px;
            display: grid; grid-template-columns: 1fr 1fr; gap: 0 22px; align-content: start;
        }
        #sp-content::-webkit-scrollbar { width: 4px; }
        #sp-content::-webkit-scrollbar-thumb { background: #1a3a5c; }
        @media (max-width: 1000px) {
            #sp-content { grid-template-columns: 1fr; }
            #sp-sidebar  { width: 160px; }
        }
        /* Shared section / row styles (used in both page and any future panels) */
        .sd-section { margin-bottom: 14px; break-inside: avoid; }
        .sd-section h4 { color: #5599cc; font-size: 0.78em; letter-spacing: 1.5px; margin-bottom: 5px; border-bottom: 1px solid #1a3a5c; padding-bottom: 3px; }
        .sd-sub { color: #3a6a9a; font-size: 0.72em; letter-spacing: 1px; text-transform: uppercase; margin: 8px 0 3px; }
        .sd-row { display: flex; justify-content: space-between; gap: 8px; font-size: 0.82em; line-height: 1.9; }
        .sd-lbl { color: #4477aa; flex-shrink: 0; }
        .sd-val { color: #e0f0ff; font-weight: 600; text-align: right; }
        .sd-sf { text-align: center; padding: 10px 8px; background: rgba(40,80,160,0.15); border: 1px solid #1a3a5c; border-radius: 6px; margin: 4px 0 6px; }
        .sd-sf-num { font-size: 1.7em; font-weight: 700; color: #7ecfff; }
        .sd-sf-label { font-size: 0.75em; color: #5599cc; margin-top: 2px; }
        .sd-sf-desc { font-size: 0.8em; color: #aac; margin-top: 5px; }
        .tle-box { font-family: monospace; font-size: 0.7em; color: #8aaccc; background: rgba(0,20,50,0.6); padding: 5px 7px; border-radius: 3px; margin: 3px 0; word-break: break-all; line-height: 1.6; }
        .sd-pending { color: #3a6a9a; font-size: 0.82em; padding: 10px 0 4px; display: flex; align-items: center; gap: 8px; }
        .sd-pending::before { content: ''; display: inline-block; width: 10px; height: 10px; border: 2px solid #1a3a5c; border-top-color: #5599cc; border-radius: 50%; animation: spin 1.2s linear infinite; flex-shrink: 0; }

        /* Zoom controls */
        #zoom-ctrl {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 10; display: flex; align-items: center;
            background: rgba(0,0,10,0.82); border: 1px solid #1a3a5c; border-radius: 8px; overflow: hidden;
        }
        .zoom-btn { background: none; border: none; color: #7ecfff; font-size: 1.4em; font-weight: 300; width: 42px; height: 38px; cursor: pointer; transition: background 0.15s; line-height: 1; }
        .zoom-btn:hover { background: rgba(100,180,255,0.15); }
        #zoom-label { padding: 0 12px; color: #5599cc; font-size: 0.82em; min-width: 90px; text-align: center; user-select: none; }

        /* Click-to-set button */
        .btn-click { background: #1a3a6a; color: #7ecfff; border: 1px solid #1a3a5c; transition: all 0.2s; }
        .btn-click.active { background: #7ecfff; color: #000; border-color: #7ecfff; }

        /* ── Mobile bottom bar & backdrop ──────────────────────────────── */
        #mob-backdrop {
            display: none; position: fixed; inset: 0; z-index: 14;
            background: rgba(0,0,10,0.55);
        }
        #mob-backdrop.show { display: block; }

        #mob-bar {
            display: none; position: fixed; bottom: 0; left: 0; right: 0; z-index: 20;
            background: rgba(0,0,15,0.97); border-top: 1px solid #1a3a5c;
            padding: 6px 0 env(safe-area-inset-bottom, 6px);
            justify-content: space-around;
        }
        .mob-tab {
            flex: 1; display: flex; flex-direction: column; align-items: center;
            gap: 2px; background: none; border: none; color: #5599cc;
            font-size: 0.6em; letter-spacing: 0.5px; cursor: pointer;
            padding: 6px 4px; font-family: inherit; transition: color 0.2s;
        }
        .mob-tab .mob-icon { font-size: 1.55em; line-height: 1; }
        .mob-tab.active, .mob-tab:hover { color: #7ecfff; }

        /* ── Mobile responsive layout ───────────────────────────────────── */
        @media (max-width: 640px) {
            #mob-bar { display: flex; }

            /* Topbar: tighten for small screens */
            #topbar { padding: 7px 10px; gap: 4px; }
            #topbar h1 { font-size: 0.68em; letter-spacing: 0; white-space: nowrap;
                overflow: hidden; text-overflow: ellipsis; max-width: 90px; }
            #const-toggles { gap: 3px; }
            .tog-btn { padding: 4px 7px; font-size: 0.66em; }
            #topbar-right { gap: 4px; }
            #topbar a, #btn-2d { font-size: 0.68em; padding: 4px 8px; }

            /* Move zoom control above the bottom bar */
            #zoom-ctrl { bottom: 66px; }

            /* Status → bottom sheet */
            #status {
                top: auto !important; left: 0 !important; right: 0 !important;
                bottom: 56px !important; width: 100% !important; min-width: unset !important;
                border-radius: 12px 12px 0 0; border-bottom: none;
                transform: translateY(110%);
                transition: transform 0.28s cubic-bezier(.2,.8,.3,1);
                max-height: 55vh; overflow-y: auto;
                padding: 16px 20px 20px;
            }
            #status.mob-open { transform: translateY(0) !important; z-index: 15; }

            /* Receiver panel → bottom sheet */
            #recv-panel {
                top: auto !important; left: 0 !important; right: 0 !important;
                bottom: 56px !important; width: 100% !important;
                border-radius: 12px 12px 0 0; border-bottom: none;
                transform: translateY(110%);
                transition: transform 0.28s cubic-bezier(.2,.8,.3,1);
                max-height: 70vh; overflow-y: auto;
            }
            #recv-panel.mob-open { transform: translateY(0) !important; z-index: 15; }

            /* Sat panel → full-width bottom sheet */
            #sat-panel {
                top: auto !important; right: 0 !important; left: 0 !important;
                bottom: 56px !important; width: 100% !important; height: 60vh !important;
                border-radius: 12px 12px 0 0; border-bottom: none;
                transform: translateY(110%);
                transition: transform 0.28s cubic-bezier(.2,.8,.3,1);
            }
            #sat-panel.mob-open { transform: translateY(0) !important; z-index: 15; }

            /* Satellite detail page: hide sidebar, single column */
            #sp-sidebar { display: none; }
            #sp-content { grid-template-columns: 1fr; padding: 12px 14px; }
            #sp-bar { padding: 8px 10px; gap: 8px; flex-wrap: wrap; }
            #sp-sat-label { font-size: 1em; }
            #sp-nav-pos { min-width: 40px; }
        }
    </style>
</head>
<body>

<div id="loading"><div class="spinner"></div><p>LOADING LIVE DATA...</p></div>
<div id="cesiumContainer"></div>
<canvas id="sky-canvas"></canvas>

<div id="topbar">
    <h1>🛰️ GPS / GLONASS / BeiDou / Galileo LIVE SKY VIEW</h1>
    <div id="const-toggles">
        <button id="tog-gps" class="tog-btn tog-gps active" onclick="toggleConst('GPS')">GPS</button>
        <button id="tog-glo" class="tog-btn tog-glo active" onclick="toggleConst('GLONASS')">GLO</button>
        <button id="tog-bei" class="tog-btn tog-bei active" onclick="toggleConst('BEIDOU')">BDS</button>
        <button id="tog-gal" class="tog-btn tog-gal active" onclick="toggleConst('GALILEO')">GAL</button>
    </div>
    <div id="topbar-right">
        <button id="btn-2d" disabled onclick="toggle2D()">⊙ 2D Sky Plot</button>
        <a href="/calculator">⚙ Calculator</a>
    </div>
</div>

<div class="card" id="status">
    <div><span class="lbl">UTC TIME </span><span class="val" id="st-time">—</span></div>
    <div><span class="lbl">ALMANAC  </span><span class="val" id="st-almanac">—</span></div>
    <div><span class="lbl">GPS      </span><span class="val" id="st-gps">—</span></div>
    <div><span class="lbl">GLONASS  </span><span class="val" id="st-glo">—</span></div>
    <div><span class="lbl">BEIDOU   </span><span class="val" id="st-bei">—</span></div>
    <div><span class="lbl">GALILEO  </span><span class="val" id="st-gal">—</span></div>
    <div><span class="lbl">UPDATE   </span><span class="val">every 5s</span></div>
</div>

<div class="card" id="recv-panel">
    <h3>📍 Receiver Location</h3>
    <div class="field-row"><label>Lat</label><input id="inp-lat" type="number" step="0.0001" min="-90" max="90" placeholder="e.g. 32.0853"></div>
    <div class="field-row"><label>Lon</label><input id="inp-lon" type="number" step="0.0001" min="-180" max="180" placeholder="e.g. 34.7818"></div>
    <div class="field-row"><label>Alt m</label><input id="inp-alt" type="number" step="1" min="0" placeholder="0"></div>
    <div class="btn-row">
        <button class="btn btn-set" onclick="setReceiver()">Set</button>
        <button class="btn btn-geo" onclick="geoLocate()">📡 My Location</button>
        <button class="btn btn-clear" onclick="clearReceiver()">✕ Clear</button>
    </div>
    <div class="btn-row" style="margin-top:6px">
        <button id="btn-click-mode" class="btn btn-click" onclick="toggleClickMode()">🖱 Click on Map</button>
    </div>
    <div id="recv-status"></div>
</div>

<div class="card" id="sat-panel">
    <h3>SATELLITES</h3>
    <div id="panel-sub">All satellites</div>
    <div id="col-header" class="no-recv">
        <span></span><span>ID</span><span>Lat / Lon</span>
    </div>
    <div id="sat-list"></div>
</div>

<div id="sat-page">
    <div id="sp-bar">
        <button id="sp-back" onclick="closeSatPage()">← BACK TO GLOBE</button>
        <span id="sp-sat-label"></span>
        <span id="sp-sat-const"></span>
        <div id="sp-bar-spacer"></div>
        <button id="sp-nav-prev" class="sp-nav-btn" onclick="navSat(-1)" disabled>‹ Prev</button>
        <span id="sp-nav-pos"></span>
        <button id="sp-nav-next" class="sp-nav-btn" onclick="navSat(1)" disabled>Next ›</button>
    </div>
    <div id="sp-const-bar">
        <button class="tog-btn sp-tog-all sp-c-btn active" data-c="ALL"     onclick="setSpConstFilter('ALL')">ALL</button>
        <button class="tog-btn tog-gps   sp-c-btn"         data-c="GPS"     onclick="setSpConstFilter('GPS')">GPS</button>
        <button class="tog-btn tog-glo   sp-c-btn"         data-c="GLONASS" onclick="setSpConstFilter('GLONASS')">GLO</button>
        <button class="tog-btn tog-bei   sp-c-btn"         data-c="BEIDOU"  onclick="setSpConstFilter('BEIDOU')">BDS</button>
        <button class="tog-btn tog-gal   sp-c-btn"         data-c="GALILEO" onclick="setSpConstFilter('GALILEO')">GAL</button>
    </div>
    <div id="sp-main">
        <div id="sp-sidebar">
            <div id="sp-sidebar-hdr">Satellites</div>
            <div id="sp-sat-list"></div>
        </div>
        <div id="sp-content"></div>
    </div>
</div>

<div id="zoom-ctrl">
    <button class="zoom-btn" onclick="adjustZoom(-1)" title="Zoom in">+</button>
    <div id="zoom-label">— km</div>
    <button class="zoom-btn" onclick="adjustZoom(1)" title="Zoom out">−</button>
</div>

<div id="mob-backdrop" onclick="mobClose()"></div>
<div id="mob-bar">
    <button class="mob-tab" id="mob-tab-status" onclick="mobToggle('status','mob-tab-status')">
        <span class="mob-icon">📊</span>STATUS
    </button>
    <button class="mob-tab" id="mob-tab-sats" onclick="mobToggle('sat-panel','mob-tab-sats')">
        <span class="mob-icon">🛰</span>SATELLITES
    </button>
    <button class="mob-tab" id="mob-tab-recv" onclick="mobToggle('recv-panel','mob-tab-recv')">
        <span class="mob-icon">📍</span>LOCATION
    </button>
</div>

<div id="tooltip"></div>

<script>
// ── Cesium init ───────────────────────────────────────────────────────
Cesium.Ion.defaultAccessToken = '';

const viewer = new Cesium.Viewer('cesiumContainer', {
    imageryProvider: new Cesium.TileMapServiceImageryProvider({
        url: Cesium.buildModuleUrl('Assets/Textures/NaturalEarthII'),
    }),
    baseLayerPicker: false,
    geocoder: false,
    homeButton: false,
    sceneModePicker: false,
    navigationHelpButton: false,
    animation: false,
    timeline: false,
    fullscreenButton: false,
    vrButton: false,
    infoBox: false,
    selectionIndicator: false,
    terrainProvider: new Cesium.EllipsoidTerrainProvider(),
    skyBox: false,
    skyAtmosphere: false,
    backgroundColor: Cesium.Color.fromCssColorString('#000005'),
});

viewer.scene.globe.enableLighting = false;
viewer.scene.backgroundColor = new Cesium.Color(0, 0, 0.02, 1);

// Start zoomed out to see the full GPS constellation (~26,000 km altitude)
viewer.camera.setView({
    destination: Cesium.Cartesian3.fromDegrees(20, 25, 55000000),
});

// ── Zoom controls ────────────────────────────────────────────────────
function adjustZoom(dir) {
    const h = viewer.camera.positionCartographic.height;
    viewer.camera.zoomIn(dir < 0 ? h * 0.35 : -h * 0.4);
    updateZoomLabel();
}

function updateZoomLabel() {
    const h = viewer.camera.positionCartographic.height;
    const km = Math.round(h / 1000).toLocaleString();
    document.getElementById('zoom-label').textContent = km + ' km';
}

viewer.camera.changed.addEventListener(updateZoomLabel);
updateZoomLabel();

// ── Click-to-set receiver ─────────────────────────────────────────────
let clickMode = false;

function toggleClickMode() {
    clickMode = !clickMode;
    document.getElementById('btn-click-mode').classList.toggle('active', clickMode);
    viewer.canvas.style.cursor = clickMode ? 'crosshair' : '';
    document.getElementById('recv-status').textContent = clickMode ? '🖱 Click the globe to place receiver' : '';
}


// ── Helpers ───────────────────────────────────────────────────────────
function satColor(constellation, healthy) {
    if (constellation === 'GLONASS') return '#00ddff';
    if (constellation === 'BEIDOU')  return '#ffcc00';
    if (constellation === 'GALILEO') return '#ff9500';
    return healthy ? '#00ff88' : '#ff5555';
}

function llhToEcef(lat, lon, altM) {
    const a = 6378137, f = 1 / 298.257223563, e2 = 2 * f - f * f;
    const lr = lat * Math.PI / 180, lo = lon * Math.PI / 180;
    const sl = Math.sin(lr), cl = Math.cos(lr);
    const N = a / Math.sqrt(1 - e2 * sl * sl);
    return { x: (N + altM) * cl * Math.cos(lo), y: (N + altM) * cl * Math.sin(lo), z: (N * (1 - e2) + altM) * sl };
}

function rangeElev(recv, satX, satY, satZ) {
    const dx = satX - recv.x, dy = satY - recv.y, dz = satZ - recv.z;
    const rangM = Math.sqrt(dx * dx + dy * dy + dz * dz);
    const rLen  = Math.sqrt(recv.x * recv.x + recv.y * recv.y + recv.z * recv.z);
    const dot   = (dx * recv.x + dy * recv.y + dz * recv.z) / (rangM * rLen);
    return { range: rangM / 1000, elev: Math.asin(Math.max(-1, Math.min(1, dot))) * 180 / Math.PI };
}

const EARTH_R_M = 6378137;
function elevMask() {
    if (!receiver) return 0;
    const h = Math.max(0, receiver.alt);
    return -Math.acos(EARTH_R_M / (EARTH_R_M + h)) * 180 / Math.PI;
}

// ── Signal data ───────────────────────────────────────────────────────
const GPS_SIGNAL_MAP = {
    11:['L1CA'], 13:['L1CA'], 14:['L1CA'], 20:['L1CA'], 21:['L1CA'], 22:['L1CA'],
    12:['L1CA','L2C'], 15:['L1CA','L2C'], 17:['L1CA','L2C'], 29:['L1CA','L2C'], 31:['L1CA','L2C'],
    1:['L1CA','L2C','L5'], 3:['L1CA','L2C','L5'], 6:['L1CA','L2C','L5'], 8:['L1CA','L2C','L5'],
    9:['L1CA','L2C','L5'], 10:['L1CA','L2C','L5'], 24:['L1CA','L2C','L5'], 25:['L1CA','L2C','L5'],
    26:['L1CA','L2C','L5'], 27:['L1CA','L2C','L5'], 30:['L1CA','L2C','L5'], 32:['L1CA','L2C','L5'],
    2:['L1CA','L1C','L2C','L5'], 4:['L1CA','L1C','L2C','L5'], 5:['L1CA','L1C','L2C','L5'],
    7:['L1CA','L1C','L2C','L5'], 18:['L1CA','L1C','L2C','L5'], 23:['L1CA','L1C','L2C','L5'],
    28:['L1CA','L1C','L2C','L5'],
};
const SIG_STYLE = {
    L1CA:'color:#4e9eff;border-color:#4e9eff66', L1C:'color:#82c0ff;border-color:#82c0ff66',
    L2C:'color:#2ec4a9;border-color:#2ec4a966',  L5:'color:#b87fff;border-color:#b87fff66',
    L1OF:'color:#00ddff;border-color:#00ddff66', L2OF:'color:#0099bb;border-color:#0099bb66',
    L3OC:'color:#00ffdd;border-color:#00ffdd66',
    B1I:'color:#ffcc00;border-color:#ffcc0066',  B2I:'color:#ffaa00;border-color:#ffaa0066',
    B3I:'color:#ff8800;border-color:#ff880066',  B1C:'color:#ffe066;border-color:#ffe06666',
    B2a:'color:#ffdd44;border-color:#ffdd4466',
    E1B:'color:#ff9500;border-color:#ff950066',  E5a:'color:#ffb84d;border-color:#ffb84d66',
    E5b:'color:#ffcc80;border-color:#ffcc8066',  E6:'color:#ff7700;border-color:#ff770066',
};

function getSignals(sat) {
    if (sat.constellation === 'GPS') return GPS_SIGNAL_MAP[sat.prn] || ['L1CA'];
    if (sat.constellation === 'GLONASS') {
        const n = (sat.name || '').toUpperCase();
        return n.includes('-K') ? ['L1OF','L2OF','L3OC'] : ['L1OF','L2OF'];
    }
    if (sat.constellation === 'BEIDOU') {
        const n = (sat.name || '').toUpperCase();
        return (n.includes('BEIDOU-3') || n.includes('BDS-3')) ? ['B1C','B2a','B3I'] : ['B1I','B2I','B3I'];
    }
    if (sat.constellation === 'GALILEO') {
        const n = (sat.name || '').toUpperCase();
        return n.includes('IOV') ? ['E1B','E5a','E5b'] : ['E1B','E5a','E5b','E6'];
    }
    return [];
}

function sigBadges(signals) {
    return '<div class="sigs">' + signals.map(s => {
        const st = SIG_STYLE[s] || 'color:#aaa;border-color:#555';
        return `<span class="sig-b" style="${st}">${s}</span>`;
    }).join('') + '</div>';
}

// ── Constellation visibility ──────────────────────────────────────────
const enabledConst = { GPS: true, GLONASS: true, BEIDOU: true, GALILEO: true };

function toggleConst(c) {
    enabledConst[c] = !enabledConst[c];
    const ids = { GPS: 'tog-gps', GLONASS: 'tog-glo', BEIDOU: 'tog-bei', GALILEO: 'tog-gal' };
    document.getElementById(ids[c]).classList.toggle('active', enabledConst[c]);
    for (const [key, entry] of Object.entries(satEntities)) {
        if (satData[key] && satData[key].constellation === c) {
            entry.point.show = enabledConst[c];
            entry.trail.show = enabledConst[c];
        }
    }
    for (const [key, link] of Object.entries(linkEntities)) {
        if (satData[key] && satData[key].constellation === c) link.show = enabledConst[c];
    }
    updatePanel(lastSatellites);
}

// ── Satellite entities ────────────────────────────────────────────────
const TRAIL_MAX = 80;
const satEntities  = {};  // label → { point, trail, trailPos[] }
const satData      = {};  // label → sat object
const linkEntities = {};  // label → polyline entity
let receiver = null, recvEntity = null, lastSatellites = [];

function cesiumColor(hex, alpha) {
    return Cesium.Color.fromCssColorString(hex).withAlpha(alpha !== undefined ? alpha : 1.0);
}

function updateSatellites(satellites) {
    lastSatellites = satellites;
    const seen = new Set();

    for (const sat of satellites) {
        seen.add(sat.label);
        satData[sat.label] = sat;

        const pos   = new Cesium.Cartesian3(sat.x, sat.y, sat.z);
        const color = cesiumColor(satColor(sat.constellation, sat.healthy));
        const show  = enabledConst[sat.constellation];

        if (!satEntities[sat.label]) {
            const point = viewer.entities.add({
                id:       sat.label,
                show:     show,
                position: new Cesium.ConstantPositionProperty(pos),
                point: {
                    pixelSize: 9,
                    color:        color,
                    outlineColor: Cesium.Color.BLACK.withAlpha(0.6),
                    outlineWidth: 1,
                },
                label: {
                    text:             sat.label,
                    font:             'bold 16px monospace',
                    fillColor:        color,
                    outlineColor:     Cesium.Color.BLACK,
                    outlineWidth:     4,
                    style:            Cesium.LabelStyle.FILL_AND_OUTLINE,
                    pixelOffset:      new Cesium.Cartesian2(14, -14),
                    horizontalOrigin: Cesium.HorizontalOrigin.LEFT,
                    verticalOrigin:   Cesium.VerticalOrigin.BOTTOM,
                    showBackground:   true,
                    backgroundColor:  new Cesium.Color(0, 0.01, 0.06, 0.78),
                    backgroundPadding: new Cesium.Cartesian2(6, 4),
                    scale: 1.0,
                },
            });
            const trail = viewer.entities.add({
                show: show,
                polyline: {
                    positions:   new Cesium.ConstantProperty([pos]),
                    width:       1.5,
                    material:    new Cesium.ColorMaterialProperty(color.withAlpha(0.4)),
                    arcType:     Cesium.ArcType.NONE,
                    clampToGround: false,
                },
            });
            satEntities[sat.label] = { point, trail, trailPos: [pos] };
        } else {
            const e = satEntities[sat.label];
            e.point.show = show;
            e.trail.show = show;
            e.point.position = new Cesium.ConstantPositionProperty(pos);
            e.point.point.color    = new Cesium.ConstantProperty(color);
            e.point.label.fillColor = new Cesium.ConstantProperty(color);
            e.trailPos.push(pos);
            if (e.trailPos.length > TRAIL_MAX) e.trailPos.shift();
            e.trail.polyline.positions = new Cesium.ConstantProperty([...e.trailPos]);
        }
    }

    for (const key of Object.keys(satEntities)) {
        if (!seen.has(key)) {
            viewer.entities.remove(satEntities[key].point);
            viewer.entities.remove(satEntities[key].trail);
            delete satEntities[key];
            delete satData[key];
        }
    }

    refreshLinks(satellites);
    updatePanel(satellites);
    if (view2D) drawSkyPlot(satellites);
}

// ── Receiver & links ──────────────────────────────────────────────────
function refreshLinks(satellites) {
    for (const key of Object.keys(linkEntities)) {
        viewer.entities.remove(linkEntities[key]);
        delete linkEntities[key];
    }
    if (!receiver) return;

    const mask = elevMask();
    const rPos = new Cesium.Cartesian3(receiver.ecef.x, receiver.ecef.y, receiver.ecef.z);

    for (const sat of satellites) {
        if (!enabledConst[sat.constellation]) continue;
        const { elev } = rangeElev(receiver.ecef, sat.x, sat.y, sat.z);
        if (elev < mask) continue;
        const sPos    = new Cesium.Cartesian3(sat.x, sat.y, sat.z);
        const elevHex = elev > 45 ? '#00ff88' : elev > 20 ? '#ffdd00' : '#ff8800';
        linkEntities[sat.label] = viewer.entities.add({
            polyline: {
                positions:   new Cesium.ConstantProperty([rPos, sPos]),
                width:       1.5,
                material:    new Cesium.ColorMaterialProperty(cesiumColor(elevHex, 0.65)),
                arcType:     Cesium.ArcType.NONE,
                clampToGround: false,
            },
        });
    }
}

function placeRecvMarker(ecef) {
    if (recvEntity) viewer.entities.remove(recvEntity);
    recvEntity = viewer.entities.add({
        position: new Cesium.ConstantPositionProperty(new Cesium.Cartesian3(ecef.x, ecef.y, ecef.z)),
        point: {
            pixelSize: 14,
            color:        cesiumColor('#ffaa00'),
            outlineColor: Cesium.Color.WHITE,
            outlineWidth: 2,
        },
        label: {
            text:        'RX',
            font:        'bold 11px monospace',
            fillColor:   cesiumColor('#ffaa00'),
            outlineColor: Cesium.Color.BLACK,
            outlineWidth: 2,
            style:       Cesium.LabelStyle.FILL_AND_OUTLINE,
            pixelOffset: new Cesium.Cartesian2(0, -20),
        },
    });
}

function setReceiver() {
    const lat = parseFloat(document.getElementById('inp-lat').value);
    const lon = parseFloat(document.getElementById('inp-lon').value);
    const alt = parseFloat(document.getElementById('inp-alt').value) || 0;
    if (isNaN(lat) || isNaN(lon) || lat < -90 || lat > 90 || lon < -180 || lon > 180) {
        document.getElementById('recv-status').textContent = '⚠ Invalid coordinates'; return;
    }
    const ecef = llhToEcef(lat, lon, alt);
    receiver = { ecef, lat, lon, alt };
    placeRecvMarker(ecef);
    viewer.camera.flyTo({ destination: Cesium.Cartesian3.fromDegrees(lon, lat, 50000000), duration: 1.5 });
    document.getElementById('recv-status').textContent = lat.toFixed(4) + '°, ' + lon.toFixed(4) + '°';
    document.getElementById('btn-2d').disabled = false;
    if (lastSatellites.length) { refreshLinks(lastSatellites); updatePanel(lastSatellites); }
}

function geoLocate() {
    if (!navigator.geolocation) { document.getElementById('recv-status').textContent = '⚠ Geolocation unavailable'; return; }
    document.getElementById('recv-status').textContent = '⏳ Locating…';
    navigator.geolocation.getCurrentPosition(pos => {
        const { latitude: lat, longitude: lon, altitude: alt } = pos.coords;
        document.getElementById('inp-lat').value = lat.toFixed(6);
        document.getElementById('inp-lon').value = lon.toFixed(6);
        document.getElementById('inp-alt').value = Math.round(alt || 0);
        setReceiver();
    }, () => { document.getElementById('recv-status').textContent = '⚠ Location denied'; });
}

function clearReceiver() {
    receiver = null;
    if (recvEntity) { viewer.entities.remove(recvEntity); recvEntity = null; }
    for (const key of Object.keys(linkEntities)) { viewer.entities.remove(linkEntities[key]); delete linkEntities[key]; }
    document.getElementById('recv-status').textContent = '';
    document.getElementById('btn-2d').disabled = true;
    if (view2D) {
        view2D = false;
        const btn = document.getElementById('btn-2d');
        btn.classList.remove('active');
        btn.textContent = '⊙ 2D Sky Plot';
        document.getElementById('cesiumContainer').style.display = '';
        document.getElementById('sky-canvas').style.display = 'none';
    }
    updatePanel(lastSatellites);
}

// ── Panel ─────────────────────────────────────────────────────────────
function updatePanel(satsArr) {
    const sub  = document.getElementById('panel-sub');
    const hdr  = document.getElementById('col-header');
    const lst  = document.getElementById('sat-list');
    const vis0 = satsArr.filter(s => enabledConst[s.constellation]);

    function dotCls(s) {
        return s.constellation === 'GLONASS' ? 'dot-glo'
             : s.constellation === 'BEIDOU'  ? 'dot-bei'
             : s.constellation === 'GALILEO' ? 'dot-gal'
             : (s.healthy ? 'dot-ok' : 'dot-fail');
    }

    if (!receiver) {
        sub.textContent = 'All satellites (' + vis0.length + ')';
        hdr.className   = 'no-recv';
        hdr.innerHTML   = '<span></span><span>ID</span><span>Lat / Lon</span>';
        lst.innerHTML   = [...vis0].sort((a, b) => {
            if (a.constellation !== b.constellation) return a.constellation < b.constellation ? -1 : 1;
            return a.prn - b.prn;
        }).map(s => `<div class="sat-row no-recv" onclick="selectSat('${s.label}')">
            <div><div class="dot ${dotCls(s)}"></div></div>
            <div class="prn" style="color:${satColor(s.constellation,s.healthy)}">${s.label}</div>
            <div class="cell">${s.lat}°<br>${s.lon}°</div>
            ${sigBadges(getSignals(s))}
        </div>`).join('');
    } else {
        const mask = elevMask();
        const vis  = vis0
            .map(s => ({ ...s, ...rangeElev(receiver.ecef, s.x, s.y, s.z) }))
            .filter(s => s.elev >= mask)
            .sort((a, b) => b.elev - a.elev);

        const sigCount = {}, constCount = { GPS: 0, GLONASS: 0, BEIDOU: 0, GALILEO: 0 };
        let totalSigs = 0;
        for (const s of vis) {
            constCount[s.constellation]++;
            for (const sig of getSignals(s)) { sigCount[sig] = (sigCount[sig] || 0) + 1; totalSigs++; }
        }
        const sigSummary = Object.entries(sigCount).sort((a, b) => a[0].localeCompare(b[0]))
            .map(([sig, n]) => `<span class="sig-b" style="${SIG_STYLE[sig] || 'color:#aaa;border-color:#555'}">${sig} ×${n}</span>`).join('');
        const constSummary = ['GPS','GLONASS','BEIDOU','GALILEO'].filter(c => constCount[c] > 0)
            .map(c => `<span style="color:${satColor(c,true)}">${c}: ${constCount[c]}</span>`).join(' • ');

        sub.innerHTML = 'In view: ' + vis.length + ' satellite' + (vis.length !== 1 ? 's' : '') + ' (' + constSummary + ')' +
            (sigSummary ? '<div class="sig-sum">Signals: ' + totalSigs + ' • ' + sigSummary + '</div>' : '');
        hdr.className   = 'recv';
        hdr.innerHTML   = '<span></span><span>ID</span><span>Range</span><span>Elev</span>';
        lst.innerHTML   = vis.map(s => {
            const ec = s.elev > 45 ? '#00ff88' : s.elev > 20 ? '#ffdd00' : '#ff8800';
            return `<div class="sat-row recv" onclick="selectSat('${s.label}')">
                <div><div class="dot ${dotCls(s)}"></div></div>
                <div class="prn" style="color:${satColor(s.constellation,s.healthy)}">${s.label}</div>
                <div class="cell">${Math.round(s.range).toLocaleString()} km</div>
                <div class="cell" style="color:${ec}">${s.elev.toFixed(1)}°</div>
                ${sigBadges(getSignals(s))}
            </div>`;
        }).join('');
    }
}

// ── Click satellite row → fly + open detail ───────────────────────────
function flyToSat(label) {
    const d = satData[label];
    if (!d) return;
    const scale = 1.25;
    viewer.camera.flyTo({
        destination: new Cesium.Cartesian3(d.x * scale, d.y * scale, d.z * scale),
        duration: 1.5,
    });
}

function selectSat(label) {
    if (satData[label]) openSatPage(satData[label]);
    if (!view2D) flyToSat(label);
}

// ── Hover tooltip ─────────────────────────────────────────────────────
const tooltip = document.getElementById('tooltip');
const evtHandler = new Cesium.ScreenSpaceEventHandler(viewer.canvas);

function pickedLabel(picked) {
    // Cesium: picked.id is the Entity object; the string id is at picked.id.id
    if (!Cesium.defined(picked)) return null;
    const label = picked.id && picked.id.id;
    return (typeof label === 'string' && satData[label]) ? label : null;
}

evtHandler.setInputAction(function(movement) {
    const label = pickedLabel(viewer.scene.pick(movement.endPosition));
    if (label) {
        const d = satData[label];
        let extra = '';
        if (receiver) {
            const { range, elev } = rangeElev(receiver.ecef, d.x, d.y, d.z);
            extra = elev >= elevMask()
                ? `<div><span class="t-lbl">Range: </span><span class="t-val">${Math.round(range).toLocaleString()} km</span></div>
                   <div><span class="t-lbl">Elev:  </span><span class="t-val">${elev.toFixed(1)}°</span></div>`
                : `<div style="color:#ff8800">Below horizon</div>`;
        }
        tooltip.style.display = 'block';
        tooltip.style.left    = (movement.endPosition.x + 14) + 'px';
        tooltip.style.top     = (movement.endPosition.y - 10) + 'px';
        tooltip.innerHTML = `<div class="t-prn" style="color:${satColor(d.constellation,d.healthy)}">${label}</div>
            <div><span class="t-lbl">Type:   </span><span class="t-val">${d.constellation}</span></div>
            <div><span class="t-lbl">Health: </span><span class="t-val">${d.healthy ? '✓ Healthy' : '✗ Unhealthy'}</span></div>
            <div><span class="t-lbl">Lat:    </span><span class="t-val">${d.lat}°</span></div>
            <div><span class="t-lbl">Lon:    </span><span class="t-val">${d.lon}°</span></div>
            <div><span class="t-lbl">Alt:    </span><span class="t-val">${d.alt_km} km</span></div>${extra}`;
    } else {
        tooltip.style.display = 'none';
    }
}, Cesium.ScreenSpaceEventType.MOUSE_MOVE);

evtHandler.setInputAction(function(click) {
    if (!clickMode) return;
    const ray = viewer.camera.getPickRay(click.position);
    const cartesian = viewer.scene.globe.pick(ray, viewer.scene);
    if (!Cesium.defined(cartesian)) return;
    const carto = Cesium.Cartographic.fromCartesian(cartesian);
    document.getElementById('inp-lat').value = Cesium.Math.toDegrees(carto.latitude).toFixed(6);
    document.getElementById('inp-lon').value = Cesium.Math.toDegrees(carto.longitude).toFixed(6);
    document.getElementById('inp-alt').value = Math.max(0, Math.round(carto.height));
    toggleClickMode();
    setReceiver();
}, Cesium.ScreenSpaceEventType.LEFT_CLICK);

// Entity click — selectedEntityChanged is the reliable Cesium API for this
viewer.selectedEntityChanged.addEventListener(function(entity) {
    if (clickMode || !entity) return;
    const label = entity.id;
    if (typeof label === 'string' && satData[label]) {
        openSatPage(satData[label]);
    }
    viewer.selectedEntity = undefined; // clear selection highlight
});

// ── Data fetch ────────────────────────────────────────────────────────
async function fetchLive() {
    try {
        const res  = await fetch('/api/live-positions');
        const data = await res.json();
        document.getElementById('loading').style.display = 'none';
        if (!res.ok) { console.error('API error:', data.error); return; }

        document.getElementById('st-time').textContent    = data.time;
        document.getElementById('st-almanac').textContent = data.almanac_date || '—';
        document.getElementById('st-gps').textContent     = data.satellites.filter(s => s.constellation === 'GPS').length;
        document.getElementById('st-glo').textContent     = data.satellites.filter(s => s.constellation === 'GLONASS').length;
        document.getElementById('st-bei').textContent     = data.satellites.filter(s => s.constellation === 'BEIDOU').length;
        document.getElementById('st-gal').textContent     = data.satellites.filter(s => s.constellation === 'GALILEO').length;

        updateSatellites(data.satellites);
    } catch (e) {
        console.error('fetchLive error:', e);
        document.getElementById('loading').style.display = 'none';
    }
}

let skyPlotSats = [];

const NAV_SF = {
    GPS:     ['Clock correction & SV accuracy','Ephemeris I — Kepler elements','Ephemeris II — Kepler elements','Almanac & ionospheric model','Almanac & satellite health'],
    GLONASS: ['Clock & frequency offset','Ephemeris (position)','Ephemeris (velocity & accel)','Almanac data','System time & health'],
    BEIDOU:  ['Clock & basic nav data','Ephemeris I','Ephemeris II','Almanac I','Almanac II'],
    GALILEO: ['Ephemeris & clock (E1B)','Ionosphere (E1B)','BGD & health','Clock & signal health','Almanac'],
};
const NAV_META = {
    GPS:     { label: 'Subframe', total: 5,  period: '30 s',  step: 6 },
    GLONASS: { label: 'String',   total: 15, period: '30 s',  step: 2 },
    BEIDOU:  { label: 'Subframe', total: 5,  period: '30 s',  step: 6 },
    GALILEO: { label: 'Page',     total: 15, period: '30 s',  step: 2 },
};

function currentNavMsg(constellation) {
    const meta = NAV_META[constellation];
    if (!meta) return null;
    const gpsEpoch = new Date('1980-01-06T00:00:00Z');
    const tow = ((Date.now() - gpsEpoch.getTime()) / 1000 + 18) % 604800;
    const idx = Math.floor(tow % (meta.total * meta.step) / meta.step) + 1;
    const desc = (NAV_SF[constellation] || [])[((idx - 1) % 5)];
    return { ...meta, index: idx, desc };
}

function sdRow(lbl, val) {
    return `<div class="sd-row"><span class="sd-lbl">${lbl}</span><span class="sd-val">${val}</span></div>`;
}

function renderNavBlock(constellation) {
    const nm = currentNavMsg(constellation);
    if (!nm) return '';
    return `<div class="sd-sf" id="sd-sf-display">
        <div class="sd-sf-num">${nm.label} ${nm.index} / ${nm.total}</div>
        <div class="sd-sf-label">${nm.period} frame &nbsp;·&nbsp; ${constellation}</div>
        <div class="sd-sf-desc">${nm.desc || ''}</div>
    </div>`;
}

let spSatList  = [];   // [{label, infoText, sat}] — ordered list for nav
let spCurrentIdx = 0;
let spConstFilter = 'ALL';

function setSpConstFilter(c) {
    spConstFilter = c;
    document.querySelectorAll('.sp-c-btn').forEach(b =>
        b.classList.toggle('active', b.getAttribute('data-c') === c));
    const currentLabel = document.getElementById('sp-sat-label').textContent;
    spSatList = buildSpList();
    if (!spSatList.find(s => s.label === currentLabel)) spCurrentIdx = 0;
    renderSpSidebar(currentLabel);
    renderSpNav(currentLabel);
}

function buildSpList() {
    let sats = lastSatellites.filter(s => enabledConst[s.constellation]);
    if (spConstFilter !== 'ALL') sats = sats.filter(s => s.constellation === spConstFilter);
    if (receiver) {
        const mask = elevMask();
        return sats
            .map(s => ({ ...s, ...azelFromEcef(receiver.ecef, s.x, s.y, s.z) }))
            .filter(s => s.elev >= mask)
            .sort((a, b) => b.elev - a.elev)
            .map(s => ({ label: s.label, infoText: s.elev.toFixed(1) + '°', sat: s }));
    }
    return [...sats]
        .sort((a, b) => a.constellation < b.constellation ? -1 : a.constellation > b.constellation ? 1 : a.prn - b.prn)
        .map(s => ({ label: s.label, infoText: '', sat: s }));
}

function renderSpSidebar(activeLabel) {
    const hdr  = document.getElementById('sp-sidebar-hdr');
    const list = document.getElementById('sp-sat-list');
    hdr.textContent = (receiver ? 'In view' : 'All sats') + ' (' + spSatList.length + ')';
    list.innerHTML = spSatList.map(item => {
        const color  = satColor(item.sat.constellation, item.sat.healthy);
        const active = item.label === activeLabel;
        return `<div class="sp-row${active ? ' sp-active' : ''}" onclick="selectSatInPage('${item.label}')">
            <div class="dot" style="background:${color};flex-shrink:0"></div>
            <span class="sp-lbl" style="color:${color}">${item.label}</span>
            ${item.infoText ? `<span class="sp-info">${item.infoText}</span>` : ''}
        </div>`;
    }).join('');
    const activeEl = list.querySelector('.sp-active');
    if (activeEl) activeEl.scrollIntoView({ block: 'nearest' });
}

function renderSpNav(activeLabel) {
    const idx = spSatList.findIndex(s => s.label === activeLabel);
    spCurrentIdx = idx >= 0 ? idx : 0;
    document.getElementById('sp-nav-pos').textContent = `${spCurrentIdx + 1} / ${spSatList.length}`;
    document.getElementById('sp-nav-prev').disabled = spCurrentIdx === 0;
    document.getElementById('sp-nav-next').disabled = spCurrentIdx >= spSatList.length - 1;
}

function loadSpContent(sat) {
    clearInterval(detailRefreshTimer);
    const label = sat.label;
    const color = satColor(sat.constellation, sat.healthy);
    document.getElementById('sp-sat-label').textContent = label;
    document.getElementById('sp-sat-label').style.color = color;
    document.getElementById('sp-sat-const').textContent = sat.constellation;

    renderSpNav(label);
    renderSpSidebar(label);

    const content = document.getElementById('sp-content');
    content.innerHTML = '<div style="color:#5599cc;padding:20px 0;grid-column:1/-1">Loading…</div>';
    content.scrollTop = 0;

    let rangeKm = null, elev = null, az = null;
    if (receiver) {
        const ae = azelFromEcef(receiver.ecef, sat.x, sat.y, sat.z);
        rangeKm = ae.range; elev = ae.elev; az = ae.az;
    }

    fetch(`/api/satellite-detail?label=${encodeURIComponent(label)}&constellation=${sat.constellation}`)
        .then(r => r.json())
        .then(data => {
            content.innerHTML = buildSatDetailHtml(data, sat, rangeKm, elev, az);
            detailRefreshTimer = setInterval(() => {
                const el = document.getElementById('sd-sf-display');
                if (el) el.outerHTML = renderNavBlock(sat.constellation);
            }, 1000);
            // If GPS RINEX sections are still pending, reload automatically once ready
            const lnavPending = sat.constellation === 'GPS' && !data.ephemeris;
            const cnavPending = sat.constellation === 'GPS' && !data.cnav;
            if (lnavPending || cnavPending) {
                setTimeout(() => {
                    if (document.getElementById('sat-page').classList.contains('open') &&
                        document.getElementById('sp-sat-label').textContent === label) {
                        loadSpContent(satData[label] || sat);
                    }
                }, 30000);
            }
        })
        .catch(() => {
            content.innerHTML = '<div style="color:#ff5555;grid-column:1/-1">Failed to load detail data.</div>';
        });
}

function openSatPage(sat) {
    spConstFilter = 'ALL';
    document.querySelectorAll('.sp-c-btn').forEach(b =>
        b.classList.toggle('active', b.getAttribute('data-c') === 'ALL'));
    spSatList = buildSpList();
    if (!spSatList.find(s => s.label === sat.label)) {
        spSatList.unshift({ label: sat.label, infoText: '', sat });
    }
    document.getElementById('sat-page').classList.add('open');
    loadSpContent(sat);
}

function closeSatPage() {
    clearInterval(detailRefreshTimer);
    document.getElementById('sat-page').classList.remove('open');
}

function navSat(dir) {
    const newIdx = spCurrentIdx + dir;
    if (newIdx < 0 || newIdx >= spSatList.length) return;
    const item = spSatList[newIdx];
    loadSpContent(satData[item.label] || item.sat);
}

function selectSatInPage(label) {
    const sat = satData[label] || (spSatList.find(s => s.label === label) || {}).sat;
    if (sat) loadSpContent(sat);
}

// Canvas click → find nearest plotted satellite
document.getElementById('sky-canvas').addEventListener('click', function(e) {
    if (!view2D) return;
    const rect = this.getBoundingClientRect();
    const mx = e.clientX - rect.left, my = e.clientY - rect.top;
    let best = null, bestD = 22;
    for (const { sat, sx, sy } of skyPlotSats) {
        const d = Math.hypot(mx - sx, my - sy);
        if (d < bestD) { bestD = d; best = sat; }
    }
    if (best) { mobClose(); openSatPage(best); }
});

// ── 2D Sky Plot ───────────────────────────────────────────────────────
let view2D = false;

function toggle2D() {
    if (!receiver) return;
    view2D = !view2D;
    const btn = document.getElementById('btn-2d');
    btn.classList.toggle('active', view2D);
    btn.textContent = view2D ? '🌐 3D Globe' : '⊙ 2D Sky Plot';
    document.getElementById('cesiumContainer').style.display = view2D ? 'none' : '';
    document.getElementById('sky-canvas').style.display = view2D ? 'block' : 'none';
    document.getElementById('zoom-ctrl').style.display = view2D ? 'none' : '';
    if (view2D) {
        mobClose();  // close any open mobile bottom sheet before drawing
        if (lastSatellites.length) drawSkyPlot(lastSatellites);
    }
}

function azelFromEcef(recv, satX, satY, satZ) {
    const dx = satX - recv.x, dy = satY - recv.y, dz = satZ - recv.z;
    const range = Math.sqrt(dx*dx + dy*dy + dz*dz);
    const ux = dx/range, uy = dy/range, uz = dz/range;
    const lon  = Math.atan2(recv.y, recv.x);
    const p    = Math.sqrt(recv.x*recv.x + recv.y*recv.y);
    const lat  = Math.atan2(recv.z, p * (1 - 0.00669437999014));
    const slat = Math.sin(lat), clat = Math.cos(lat);
    const slon = Math.sin(lon), clon = Math.cos(lon);
    const n = -slat*clon*ux - slat*slon*uy + clat*uz;
    const e = -slon*ux + clon*uy;
    const u =  clat*clon*ux + clat*slon*uy + slat*uz;
    return {
        range: range / 1000,
        elev:  Math.asin(Math.max(-1, Math.min(1, u))) * 180 / Math.PI,
        az:    (Math.atan2(e, n) * 180 / Math.PI + 360) % 360,
    };
}

function drawSkyPlot(satellites) {
    const canvas = document.getElementById('sky-canvas');
    const dpr = window.devicePixelRatio || 1;
    canvas.width  = window.innerWidth  * dpr;
    canvas.height = window.innerHeight * dpr;
    canvas.style.width  = window.innerWidth  + 'px';
    canvas.style.height = window.innerHeight + 'px';
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
    const W = window.innerWidth, H = window.innerHeight;
    const topOffset    = document.getElementById('topbar').getBoundingClientRect().height;
    const mobBarEl     = document.getElementById('mob-bar');
    const bottomOffset = (mobBarEl && getComputedStyle(mobBarEl).display !== 'none') ? mobBarEl.offsetHeight : 0;
    const drawH = H - topOffset - bottomOffset;
    const cx = W / 2;
    const cy = topOffset + drawH / 2;
    const R  = Math.min(W, drawH) * 0.42;

    ctx.fillStyle = '#000008';
    ctx.fillRect(0, 0, W, H);

    // Elevation rings at 0°, 30°, 60°
    for (const elDeg of [0, 30, 60]) {
        const r = R * (90 - elDeg) / 90;
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(80,130,220,0.3)';
        ctx.lineWidth = 1;
        ctx.stroke();
        ctx.fillStyle = '#3a5a88';
        ctx.font = '11px sans-serif';
        ctx.textAlign = 'left';
        ctx.textBaseline = 'middle';
        ctx.fillText(elDeg + '°', cx + r + 4, cy);
    }

    // Azimuth spokes every 45°
    ctx.strokeStyle = 'rgba(80,130,220,0.18)';
    ctx.lineWidth = 1;
    for (let a = 0; a < 360; a += 45) {
        const rad = a * Math.PI / 180;
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(cx + R * Math.sin(rad), cy - R * Math.cos(rad));
        ctx.stroke();
    }

    // Cardinal labels
    const DIRS = [['N',0],['NE',45],['E',90],['SE',135],['S',180],['SW',225],['W',270],['NW',315]];
    ctx.fillStyle = '#7ecfff';
    ctx.font = 'bold 13px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    for (const [lbl, az] of DIRS) {
        const r = R + 20;
        ctx.fillText(lbl, cx + r * Math.sin(az * Math.PI/180), cy - r * Math.cos(az * Math.PI/180));
    }

    // Satellites
    skyPlotSats = [];
    const mask = elevMask();
    for (const sat of satellites) {
        if (!enabledConst[sat.constellation]) continue;
        const { elev, az } = azelFromEcef(receiver.ecef, sat.x, sat.y, sat.z);
        if (elev < mask) continue;
        const r  = R * (90 - elev) / 90;
        const sx = cx + r * Math.sin(az * Math.PI / 180);
        const sy = cy - r * Math.cos(az * Math.PI / 180);
        const col = satColor(sat.constellation, sat.healthy);
        const num = sat.label.replace(/^[A-Za-z]+/, '');

        ctx.beginPath();
        ctx.arc(sx, sy, 15, 0, Math.PI * 2);
        ctx.fillStyle = col;
        ctx.fill();
        ctx.strokeStyle = 'rgba(0,0,0,0.55)';
        ctx.lineWidth = 1.5;
        ctx.stroke();

        ctx.fillStyle = '#000';
        ctx.font = 'bold 10px monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(num, sx, sy);

        skyPlotSats.push({ sat, sx, sy });
    }
}

window.addEventListener('resize', () => {
    if (view2D && lastSatellites.length) drawSkyPlot(lastSatellites);
});

// ── TLE loading: server proxy first, direct browser fetch as fallback ────
// 1. Ask our server to fetch from Celestrak (avoids browser CORS/403 blocks).
// 2. If the server is also blocked, fall back to browser → push-tles flow.
async function pushTLEsFromBrowser(group, constellation) {
    // Try server-side proxy first
    try {
        const r = await fetch('/api/fetch-tles', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ group, constellation }),
        });
        const result = await r.json();
        if (result.success) {
            console.log(`Server fetched ${result.count} ${constellation} TLEs`);
            return true;
        }
        console.warn(`Server TLE proxy failed for ${constellation}: ${result.error}`);
    } catch (e) {
        console.warn(`Server TLE proxy error for ${constellation}:`, e.message);
    }

    // Fallback: browser fetches TLE text and pushes to server.
    // GitHub raw is reachable from any browser (no IP blocks, sends CORS headers)
    // and is refreshed every 6h by the update-tles GitHub Action.
    const urls = [
        `https://raw.githubusercontent.com/kobirosenthal-commits/gps-calculator/main/data/${group}.tle`,
        `https://celestrak.org/NORAD/elements/gp.php?GROUP=${group}&FORMAT=tle`,
        `https://www.celestrak.com/NORAD/elements/gp.php?GROUP=${group}&FORMAT=tle`,
    ];
    for (const url of urls) {
        try {
            const resp = await fetch(url, { cache: 'no-store', referrerPolicy: 'no-referrer' });
            if (!resp.ok) continue;
            const text = await resp.text();
            if (!text || !text.includes('1 ')) continue;
            const pushResp = await fetch('/api/push-tles', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ constellation, text }),
            });
            const result = await pushResp.json();
            if (result.success) {
                console.log(`Browser pushed ${result.count} ${constellation} TLEs`);
                return true;
            }
        } catch (e) {
            console.warn(`TLE push failed for ${constellation} via ${url}:`, e.message);
        }
    }
    return false;
}

const _tleLoaded = { GLONASS: false, BEIDOU: false, GALILEO: false };

async function bootstrapTLEs() {
    const jobs = [
        { group: 'glo-ops', constellation: 'GLONASS' },
        { group: 'beidou',  constellation: 'BEIDOU'  },
        { group: 'galileo', constellation: 'GALILEO' },
    ].filter(j => !_tleLoaded[j.constellation]);

    if (!jobs.length) return;

    const results = await Promise.all(jobs.map(j =>
        pushTLEsFromBrowser(j.group, j.constellation).then(ok => {
            if (ok) _tleLoaded[j.constellation] = true;
            return ok;
        })
    ));

    // If any constellation still missing, retry in 30s (background thread may still be fetching)
    if (results.some(r => !r)) {
        setTimeout(bootstrapTLEs, 30000);
    }
}

// Kick off TLE loading, then start live position polling.
// GPS uses NOAA almanac so it appears immediately; GLO/BDS/GAL retry until the
// server background thread finishes fetching (Celestrak or SatNOGS fallback).
bootstrapTLEs();
fetchLive();
setInterval(fetchLive, 5000);

// Full refresh every 6 hours
setInterval(() => {
    Object.keys(_tleLoaded).forEach(k => _tleLoaded[k] = false);
    bootstrapTLEs();
}, 6 * 3600 * 1000);

// ── Mobile bottom-sheet toggles ───────────────────────────────────────
const MOB_PANELS = ['status', 'sat-panel', 'recv-panel'];
const MOB_TABS   = ['mob-tab-status', 'mob-tab-sats', 'mob-tab-recv'];

function mobToggle(panelId, tabId) {
    const panel = document.getElementById(panelId);
    const alreadyOpen = panel.classList.contains('mob-open');
    MOB_PANELS.forEach(id => document.getElementById(id).classList.remove('mob-open'));
    MOB_TABS.forEach(id => document.getElementById(id).classList.remove('active'));
    const backdrop = document.getElementById('mob-backdrop');
    if (alreadyOpen) {
        backdrop.classList.remove('show');
    } else {
        panel.classList.add('mob-open');
        document.getElementById(tabId).classList.add('active');
        backdrop.classList.add('show');
    }
}

function mobClose() {
    MOB_PANELS.forEach(id => document.getElementById(id).classList.remove('mob-open'));
    MOB_TABS.forEach(id => document.getElementById(id).classList.remove('active'));
    document.getElementById('mob-backdrop').classList.remove('show');
}
