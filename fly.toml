# Fly.io config — generate the app first with `fly launch --no-deploy`, then
# replace the auto-generated fly.toml with this file (or `fly apps create
# gps-calculator` and `fly deploy`). Region "iad" is US-east; pick the closest
# Fly region with `fly platform regions`.
app = "gps-calculator"
primary_region = "iad"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  # Keep one machine running so the app doesn't cold-start. Set
  # min_machines_running = 0 if you want Render-style spin-down to save resources.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
